<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المتدربين - أكاديمية الشبكات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* التنسيقات الإضافية لبوابة المتدرب */
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Cairo', sans-serif; margin: 0; display: flex; }
        
        /* القائمة الجانبية الموحدة */
        .sidebar { width: 250px; background: #161b22; height: 100vh; padding: 20px 0; border-left: 1px solid #30363d; position: fixed; right: 0; }
        .sidebar-header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        .sidebar-header h2 { color: #fff; margin: 0; font-size: 1.2rem; }
        .sidebar-header span { font-size: 0.8rem; color: #1fb141; }
        .nav-link { display: block; padding: 12px 20px; color: #8b949e; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: #1f2428; color: #fff; border-right: 3px solid #1fb141; }
        
        /* منطقة المحتوى */
        .main-content { margin-right: 250px; padding: 30px; width: calc(100% - 250px); box-sizing: border-box; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* بطاقات المقررات والاختبارات */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: #8a2be2; }
        .card h3 { color: #fff; margin-top: 0; }
        .card p { color: #8b949e; font-size: 0.9rem; }
        .btn-primary { background: #8a2be2; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-primary:hover { background: #7122b8; }
        
        /* واجهة قراءة المقال */
        #article-reader { background: #fff; color: #000; padding: 30px; border-radius: 8px; margin-top: 20px; display: none; }
        
        /* واجهة حل الاختبار */
        #quiz-taker { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; display: none; }
        .question-block { background: #0d1117; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #30363d; }
        .option-label { display: block; margin: 10px 0; padding: 10px; background: #161b22; border-radius: 4px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .option-label:hover { border-color: #8a2be2; }
        input[type="radio"] { margin-left: 10px; accent-color: #8a2be2; }
        
        /* شاشة التحميل */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #30363d; border-top: 4px solid #1fb141; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #8b949e;">جارِ التحقق من الصلاحيات وجلب المقررات...</p>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>أكاديمية الشبكات</h2>
            <span>بوابة المتدرب</span>
        </div>
        <a class="nav-link active" onclick="switchTab('courses')">📚 المقررات الدراسية</a>
        <a class="nav-link" onclick="switchTab('quizzes')">📝 الاختبارات المتاحة</a>
        <a class="nav-link" onclick="switchTab('results')">📊 سجل الدرجات</a>
        <a class="nav-link" id="logout-btn" style="color: #ff4444; margin-top: 50px;">🚪 تسجيل الخروج</a>
    </div>

    <div class="main-content">
        
        <div id="courses-tab" class="tab-content active">
            <h2>المقررات الدراسية</h2>
            <p style="color: #8b949e;">اختر المقرر الذي ترغب بقراءته.</p>
            <div id="courses-list" class="card-grid">
                </div>
            
            <div id="article-reader">
                <button class="btn-primary" onclick="closeArticle()" style="background: #30363d; margin-bottom: 20px;">&rarr; عودة للمقررات</button>
                <h1 id="reader-title"></h1>
                <div id="reader-content"></div>
            </div>
        </div>

        <div id="quizzes-tab" class="tab-content">
            <h2>الاختبارات المتاحة</h2>
            <div id="quizzes-list" class="card-grid">
                </div>
            
            <div id="quiz-taker">
                <h2 id="taker-title"></h2>
                <div id="taker-questions"></div>
                <button class="btn-primary" id="submit-quiz-btn" style="width: 100%; margin-top: 20px; font-size: 1.1rem; padding: 15px;">إرسال الإجابات واعتماد النتيجة</button>
                <button class="btn-primary" onclick="closeQuiz()" style="background: #30363d; width: 100%; margin-top: 10px;">إلغاء والعودة</button>
            </div>
        </div>

        <div id="results-tab" class="tab-content">
            <h2>سجل درجاتك</h2>
            <div id="results-list" class="card-grid">
                </div>
        </div>

    </div>

    <script type="module" src="student.js"></script>
    <script>
        // دالة بسيطة للتنقل بين التبويبات
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            event.currentTarget.classList.add('active');
            
            // إغلاق أي مقال أو اختبار مفتوح عند تغيير التبويب
            closeArticle();
            closeQuiz();
        }
        function closeArticle() {
            document.getElementById('article-reader').style.display = 'none';
            document.getElementById('courses-list').style.display = 'grid';
        }
        function closeQuiz() {
            document.getElementById('quiz-taker').style.display = 'none';
            document.getElementById('quizzes-list').style.display = 'grid';
        }
    </script>
</body>
</html>
