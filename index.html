<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكات الحاسب الآلي | منصور مستور الزهراني</title>
    
    <!-- جلب الخطوط العربية المتعددة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@400;700;900&family=Almarai:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Cairo', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'],
                        tajawal: ['Tajawal', 'sans-serif'],
                        almarai: ['Almarai', 'sans-serif']
                    },
                    colors: { primary: '#ffffff', secondary: '#2563eb', accent: '#0ea5e9' }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            /* إعدادات الخلفية لتظهر الصورة المرفقة بوضوح تام بدون تشويش */
            .site-bg { 
                background-image: url('bakground.jpg'); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-color: #f1f5f9; 
            }
            
            /* البطاقات الزجاجية الموحدة */
            .glass-card { @apply bg-white/90 backdrop-blur-xl border border-white/50 shadow-lg rounded-[2rem] overflow-hidden; }
            .hover-scale { @apply transition-all duration-300 hover:-translate-y-1.5 hover:shadow-2xl hover:border-blue-400 hover:bg-white; }
            
            /* تصميم القائمة الجانبية (Sidebar) - لون أغمق قليلاً من المحتوى */
            .sidebar-bg { @apply bg-slate-200/95 backdrop-blur-xl border-l border-slate-300 shadow-2xl; }
            .sidebar-item { @apply flex items-center gap-3 px-5 py-3.5 w-full text-right font-black text-slate-700 rounded-xl transition cursor-pointer border-r-4 border-transparent hover:bg-white/80 hover:text-blue-700 shadow-sm mb-1; }
            .sidebar-item.active { @apply bg-blue-600 text-white border-blue-800 shadow-md; }
            .sidebar-item.active i { @apply text-white; }
            .sub-tab { @apply block w-full text-right px-10 py-2.5 text-sm font-bold text-slate-600 hover:text-blue-700 transition cursor-pointer hover:bg-white/60 rounded-lg; }
            .sub-tab.active { @apply text-blue-800 border-r-4 border-blue-500 bg-blue-100/80; }
            
            .btn-primary { @apply w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition shadow-lg shadow-blue-600/30; }
            
            /* تنسيقات محرر النصوص والمحتوى المعروض */
            .editor-toolbar { @apply bg-slate-100/95 backdrop-blur p-3 rounded-t-2xl flex flex-wrap gap-2 items-center border border-slate-300 border-b-0 shadow-inner; }
            .editor-toolbar button, .editor-toolbar select { @apply bg-white hover:bg-blue-50 text-slate-700 px-3 py-1.5 rounded-lg cursor-pointer transition text-sm font-bold border border-slate-200 outline-none shadow-sm flex items-center gap-1; }
            .editor-toolbar input[type="color"] { @apply bg-white border border-slate-200 cursor-pointer w-8 h-8 p-0.5 rounded-lg shadow-sm; }
            
            .rich-editor, .rich-display { @apply w-full p-8 bg-white/95 backdrop-blur border border-slate-300 rounded-b-2xl text-slate-800 outline-none overflow-y-auto leading-loose text-lg font-medium shadow-sm; }
            
            /* تم تحرير هذه التنسيقات لكي يقبل المحرر ألوان وأحجام المستخدم */
            .rich-editor h1, .rich-display h1 { @apply font-black mb-4 mt-4; }
            .rich-editor h2, .rich-display h2 { @apply font-black mb-4 mt-4; }
            .rich-editor h3, .rich-display h3 { @apply font-black mb-3 mt-3; }
            .rich-editor p, .rich-display p { @apply mb-4 text-justify; }
            .rich-editor ul, .rich-display ul { @apply list-disc list-inside mb-6 mr-4 space-y-2 font-bold; }
            
            /* تصميم الجداول والمربعات */
            .rich-editor table, .rich-display table { @apply w-full text-center border-collapse bg-white/90 mb-8 rounded-2xl overflow-hidden shadow-sm border border-slate-200; }
            .rich-editor th, .rich-display th { @apply bg-slate-100/90 p-4 border-b border-slate-300 font-black text-lg; }
            .rich-editor td, .rich-display td { @apply p-4 border-b border-slate-200 font-bold; }
            .rich-editor img, .rich-display img { @apply max-w-full h-auto rounded-xl shadow-md my-4 object-cover inline-block border border-slate-200; }
            
            /* أحجام الخطوط المخصصة من المحرر */
            .rich-editor font[size="3"], .rich-display font[size="3"] { font-size: 1rem; }
            .rich-editor font[size="5"], .rich-display font[size="5"] { font-size: 1.5rem; font-weight: bold; }
            .rich-editor font[size="6"], .rich-display font[size="6"] { font-size: 2rem; font-weight: 900; }
            .rich-editor font[size="7"], .rich-display font[size="7"] { font-size: 2.5rem; font-weight: 900; }

            /* الكروت الجاهزة */
            .custom-grid-container { @apply grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 my-8 text-center items-stretch; }
            .custom-grid-card { @apply bg-white/80 backdrop-blur-sm border border-slate-200 p-8 rounded-[2rem] shadow-sm transition hover:-translate-y-1 hover:shadow-md flex flex-col h-full; }
            .custom-grid-icon { @apply text-5xl mb-4 block mx-auto drop-shadow-sm; }
            .custom-grid-title { @apply text-xl font-black mb-3; }
            .custom-grid-desc { @apply text-sm font-bold leading-relaxed flex-grow; }
        }
        .page-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast { @apply fixed bottom-5 left-5 z-[9999] opacity-0 translate-y-10 transition-all duration-300 bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl text-slate-800; }
        .toast.show { @apply opacity-100 translate-y-0; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-blue-200 selection:text-blue-900 flex h-screen site-bg overflow-hidden relative">

    <!-- طبقة شفافة خفيفة جداً لضمان قراءة النصوص دون طمس معالم الصورة -->
    <div class="absolute inset-0 bg-white/30 -z-10"></div>

    <!-- القائمة الجانبية (Sidebar) الثابتة على اليمين بلون أغمق -->
    <aside id="main-sidebar" class="w-72 md:w-80 sidebar-bg z-[100] flex-col hidden fixed inset-y-0 right-0 lg:static lg:flex h-full flex-shrink-0 transition-transform duration-300">
        <div class="p-6 border-b border-slate-300/50 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer hover:opacity-80 transition" onclick="window.goHome()">
                <div class="bg-blue-600 p-3 rounded-2xl shadow-md border border-blue-500"><i class="fas fa-network-wired text-white text-xl"></i></div>
                <h1 class="font-black text-slate-800 text-xl tracking-tight drop-shadow-sm">أكاديمية الشبكات</h1>
            </div>
            <button onclick="document.getElementById('main-sidebar').classList.add('hidden')" class="lg:hidden text-slate-500 hover:text-red-500 text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2" id="sidebar-nav">
            <!-- سيتم توليد الروابط هنا برمجياً -->
        </nav>
        
        <div class="p-6 border-t border-slate-300/50 bg-slate-300/40 text-center shrink-0">
            <p class="text-xs font-black text-slate-600 leading-relaxed uppercase tracking-widest mb-1">إعداد وتصميم</p>
            <p class="text-blue-800 font-black drop-shadow-sm">منصور مستور الزهراني</p>
        </div>
    </aside>

    <!-- المساحة الرئيسية للعمل -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative bg-transparent">
        
        <!-- الشريط العلوي للتنقل في الجوال -->
        <nav class="lg:hidden bg-white/90 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-slate-200 shadow-sm flex justify-between items-center">
            <button onclick="document.getElementById('main-sidebar').classList.remove('hidden')" class="text-slate-600 hover:text-blue-600 text-2xl p-2 transition"><i class="fas fa-bars"></i></button>
            <div class="font-black text-blue-800 text-xl flex items-center gap-2 cursor-pointer" onclick="window.goHome()"><i class="fas fa-network-wired text-blue-600"></i> أكاديمية الشبكات</div>
            <button onclick="window.toggleFS()" class="text-slate-600 text-xl p-2"><i class="fas fa-expand" id="fs-icon"></i></button>
        </nav>

        <!-- منطقة التمرير للمحتوى -->
        <main id="main-scroll-area" class="flex-1 overflow-y-auto p-4 md:p-10 custom-scrollbar">
            
            <!-- الواجهة الرئيسية -->
            <div id="portal-dashboard" class="block page-enter max-w-7xl mx-auto">
                <header class="bg-white/90 backdrop-blur-xl rounded-[3rem] p-10 md:p-20 text-center border border-white/50 shadow-xl mb-12 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-blue-50 to-transparent opacity-50"></div>
                    <div class="relative z-10">
                        <span class="bg-blue-100/80 text-blue-800 py-2.5 px-8 rounded-full text-sm font-black mb-8 inline-block shadow-sm border border-blue-200 backdrop-blur-sm">المؤسسة العامة للتدريب التقني والمهني</span>
                        <h1 class="text-5xl md:text-7xl font-black mb-6 text-slate-800 tracking-tight drop-shadow-sm">شبكات <span class="text-blue-600">الحاسب الآلي</span></h1>
                        <p class="text-lg md:text-2xl text-slate-700 max-w-3xl mx-auto font-bold leading-relaxed drop-shadow-sm">المرجع الأكاديمي الشامل لمهندسي الشبكات، يغطي المبادئ، الأمان، بروتوكولات التوجيه، والمعايير الفيزيائية.</p>
                    </div>
                </header>
                
                <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- سيتم تعبئة البطاقات هنا برمجياً -->
                </div>
            </div>

            <!-- حاوية الأقسام التعليمية -->
            <div id="section-container" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="bg-white/90 backdrop-blur-xl p-10 rounded-[3rem] shadow-sm border border-white/50 mb-8 text-center">
                    <h1 id="section-title" class="text-4xl md:text-5xl font-black text-blue-800 tracking-tight drop-shadow-sm">العنوان</h1>
                </header>

                <div id="mobile-tabs" class="lg:hidden flex gap-2 overflow-x-auto custom-scrollbar mb-8 pb-2"></div>
                
                <div id="content-area" class="w-full page-enter">
                    <!-- المحتوى سيحقن هنا -->
                </div>
            </div>

            <!-- قسم الاختبارات (LMS Views) -->
            <div id="section-exams" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="bg-white/90 backdrop-blur-xl p-10 rounded-[3rem] shadow-sm border border-white/50 mb-8 text-center">
                    <h1 class="text-4xl md:text-5xl font-black text-yellow-600 tracking-tight drop-shadow-sm">قسم الاختبارات والتقييمات</h1>
                </header>
                <div id="lms-area"></div>
            </div>

        </main>
    </div>

    <div id="tst" class="toast"><i id="tsti" class="fas"></i><span id="tstt"></span></div>

    <!-- بيانات المحتوى الأساسية (مفرغة 100% من ملفات الـ PDF مع تنسيق موحد CSS) -->
    <script>
        const CORE_DATA = {
            'networks': {
                title: 'مبادئ شبكات الحاسب', icon: 'fa-globe', color: 'blue', desc: 'مفهوم الشبكة، المكونات، الفوائد، والتصاميم الهندسية بالكامل.',
                tabs: ['مفهوم الشبكة والفوائد', 'المكونات والوسائط', 'التصاميم الجغرافية والمعمارية'],
                content: [
                    `<div class="rich-display glass-card">
                        <h1 style="color: #1e40af;"><i class="fas fa-info-circle ml-2"></i> ماهي شبكة الحاسب؟</h1>
                        <p>شبكة الحاسب (Computer Network) عبارة عن مجموعة من الحاسبات والأجهزة الأخرى المتصلة مع بعضها البعض حيث يكون لها القدرة على مشاركة عدد كبير من المستخدمين للبيانات (Data) والأجهزة (Hardware) كما تعتبر الشبكة وسيلة اتصال الكتروني بين الأفراد.</p>
                        
                        <h2 style="text-align: center; margin-top: 2rem; color: #1e293b;">فوائد شبكات الحاسب</h2>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-t-4 border-t-blue-500 bg-blue-50/30">
                                <i class="fas fa-database custom-grid-icon text-blue-500"></i>
                                <div class="custom-grid-title text-blue-800">مشاركة البيانات</div>
                                <p class="custom-grid-desc">نقل المعلومات والملفات بسرعة فائقة بين المستخدمين دون وسائط تخزين خارجية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-emerald-500 bg-emerald-50/30">
                                <i class="fas fa-print custom-grid-icon text-emerald-500"></i>
                                <div class="custom-grid-title text-emerald-800">مشاركة الموارد</div>
                                <p class="custom-grid-desc">تتيح للجميع استخدام أجهزة صلبة (Hardware) مثل الطابعات والماسحات الضوئية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-purple-500 bg-purple-50/30">
                                <i class="fas fa-laptop-code custom-grid-icon text-purple-500"></i>
                                <div class="custom-grid-title text-purple-800">مشاركة البرمجيات</div>
                                <p class="custom-grid-desc">العمل على برامج موحدة (Software) بتثبيت نسخة واحدة على الخادم للجميع.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-orange-500 bg-orange-50/30 md:col-span-1 lg:col-span-1">
                                <i class="fas fa-folder-open custom-grid-icon text-orange-500"></i>
                                <div class="custom-grid-title text-orange-800">مشاركة الملفات مباشرة</div>
                                <p class="custom-grid-desc">نقل مباشر بين الأجهزة بدلاً من إرسالها عبر البريد الإلكتروني.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-red-500 bg-red-50/50 md:col-span-2 lg:col-span-2">
                                <i class="fas fa-gamepad custom-grid-icon text-red-500"></i>
                                <div class="custom-grid-title text-red-800">ألعاب الكمبيوتر الجماعية</div>
                                <p class="custom-grid-desc">التفاعل بين أكثر من مستخدم (Multiplayer) للعب في نفس البيئة الافتراضية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card">
                        <h1 style="text-align: center; color: #1e293b;">مكونات شبكة الحاسب</h1>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card bg-blue-50/40">
                                <i class="fas fa-desktop custom-grid-icon text-blue-600"></i>
                                <div class="custom-grid-title text-blue-800">الأجهزة الطرفية</div>
                                <div class="text-blue-500 font-black mb-4 uppercase text-xs tracking-widest bg-blue-100/60 py-1.5 rounded shadow-sm">End Devices</div>
                                <p class="custom-grid-desc text-justify">الجهاز الطرفي: هو المكان الذي تنشأ منه الرسالة أو المكان الذي يتم استلامها فيه. تنشأ البيانات باستخدام جهاز طرفي وتتدفق خلال الشبكة وتصل إلى جهاز طرفي آخر. (مثل أجهزة الكمبيوتر، الطابعات الشبكية، الكاميرات، الجوالات).</p>
                            </div>
                            <div class="custom-grid-card bg-indigo-50/40">
                                <div class="flex justify-center gap-4 mb-4 h-12">
                                    <i class="fas fa-random text-5xl text-indigo-600"></i>
                                    <i class="fas fa-route text-5xl text-indigo-600"></i>
                                </div>
                                <div class="custom-grid-title text-indigo-800">الأجهزة الوسيطة</div>
                                <div class="text-indigo-500 font-black mb-4 uppercase text-xs tracking-widest bg-indigo-100/60 py-1.5 rounded shadow-sm">Intermediary</div>
                                <p class="custom-grid-desc text-justify">تقوم بالاتصال البيني بين الأجهزة الطرفية وتوجيه الحزم واختيار المسار وحماية الشبكة. من الأمثلة عليها: أجهزة التبديل (Switch)، أجهزة التوجيه (Router)، نقاط الوصول اللاسلكية (Access Point)، وجدران الحماية (Firewalls).</p>
                            </div>
                            <div class="custom-grid-card bg-emerald-50/40">
                                <i class="fas fa-wifi custom-grid-icon text-emerald-600"></i>
                                <div class="custom-grid-title text-emerald-800">وسائط الشبكة</div>
                                <div class="text-emerald-500 font-black mb-4 uppercase text-xs tracking-widest bg-emerald-100/60 py-1.5 rounded shadow-sm">Media</div>
                                <p class="custom-grid-desc text-justify">يتم نقل الاتصالات عبر الشبكة من خلال وسيط يسمح للرسالة بالانتقال من المصدر إلى الوجهة. وتشمل: الكابلات النحاسية، كابلات الألياف الضوئية، والموجات اللاسلكية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card">
                        <h2 style="color: #1e293b;">الشبكات من حيث المدى الجغرافي</h2>
                        <div class="custom-grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                            <div class="custom-grid-card bg-white/60">
                                <i class="fab fa-bluetooth custom-grid-icon text-blue-500"></i>
                                <div class="custom-grid-title text-blue-800">PAN</div>
                                <p class="custom-grid-desc">الشبكة الشخصية لتوصيل الأجهزة في نطاق أمتار كالبلوتوث.</p>
                            </div>
                            <div class="custom-grid-card bg-white/60">
                                <i class="fas fa-building custom-grid-icon text-emerald-500"></i>
                                <div class="custom-grid-title text-emerald-800">LAN</div>
                                <p class="custom-grid-desc">الشبكة المحلية داخل منطقة جغرافية محدودة كالمباني والمكاتب.</p>
                            </div>
                            <div class="custom-grid-card bg-white/60">
                                <i class="fas fa-city custom-grid-icon text-purple-500"></i>
                                <div class="custom-grid-title text-purple-800">MAN</div>
                                <p class="custom-grid-desc">الشبكة المتوسطة الإقليمية التي تربط LANs ضمن مدينة واحدة.</p>
                            </div>
                            <div class="custom-grid-card bg-white/60">
                                <i class="fas fa-globe-africa custom-grid-icon text-orange-500"></i>
                                <div class="custom-grid-title text-orange-800">WAN</div>
                                <p class="custom-grid-desc">الشبكة الواسعة للربط بين مدن ودول وتغطي مسافات شاسعة.</p>
                            </div>
                        </div>

                        <hr class="my-10 border-slate-200">

                        <div class="grid md:grid-cols-2 gap-10">
                            <div>
                                <h2 style="color: #1e293b;">المعمارية التقنية (Architecture)</h2>
                                <div class="bg-indigo-50/60 p-6 rounded-2xl border border-indigo-100 mb-4 flex items-center gap-4 shadow-sm">
                                    <i class="fas fa-users text-4xl text-indigo-500"></i>
                                    <div>
                                        <h3 class="!text-lg !mb-1 text-indigo-800">نظير إلى نظير (P2P)</h3>
                                        <p class="!text-sm text-slate-600 !mb-0 font-bold leading-relaxed">بنية شبكية موزعة تتصل فيها الأجهزة مباشرة دون خادم مركزي، كل جهاز يسمى "نظير" ويعمل كعميل وخادم.</p>
                                    </div>
                                </div>
                                <div class="bg-blue-50/60 p-6 rounded-2xl border border-blue-100 flex items-center gap-4 shadow-sm">
                                    <i class="fas fa-server text-4xl text-blue-500"></i>
                                    <div>
                                        <h3 class="!text-lg !mb-1 text-blue-800">العميل والخادم (Client/Server)</h3>
                                        <p class="!text-sm text-slate-600 !mb-0 font-bold leading-relaxed">بنية تعتمد على وجود خادم مركزي يقدم خدمات وموارد، وعملاء يطلبون هذه الخدمات وتتم معالجتها بالخادم.</p>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h2 style="color: #1e293b;">التصميم الهندسي (Topologies)</h2>
                                <div class="grid grid-cols-2 gap-4 text-center">
                                    <div class="bg-emerald-50/60 p-5 rounded-2xl border border-emerald-100 shadow-sm hover-scale">
                                        <i class="fas fa-grip-lines text-3xl text-emerald-600 mb-2 block"></i>
                                        <span class="font-black text-emerald-900">الخطية (Bus)</span>
                                        <p class="text-[10px] text-slate-600 mt-1 font-bold">كابل رئيسي واحد.</p>
                                    </div>

                content: [
                    `<div class="rich-display glass-card">
                        <h1 style="color: #dc2626;"><i class="fas fa-shield-alt ml-2 text-red-500"></i> التهديدات الأمنية للشبكة</h1>
                        <p>أمان الشبكات هو مجموعة من السياسات والتقنيات التي تهدف إلى حماية البيانات والأجهزة والموارد المتصلة بالشبكة من الوصول غير المصرح به، أو التخريب، أو سوء الاستخدام.</p>

                                <p class="!text-sm text-slate-700">تأتي من خارج حدود الشبكة (الإنترنت). قد تؤدي لسرقة بيانات، تعطيل خدمات، أو ابتزاز مالي.</p>

            'osi': {
                title: 'نموذج OSI المرجعي', icon: 'fa-layer-group', color: 'emerald', desc: 'تحليل معماري للطبقات السبع، عمليات التغليف، والمقارنات.',
                tabs: ['مقدمة والطبقات السبع', 'التغليف وأنواع الاتصال', 'مقارنات بروتوكولات وأجهزة'],
                content: [
                    `<div class="rich-display glass-card">
                        <h1 style="color: #059669;">مرجع OSI (Open Systems Interconnection)</h1>
                        <p>هو مراحل تكون البيانات ونقلها من الجهاز المرسل (Source device) إلى الجهاز المستقبل (Destination device). وضعته المنظمة الدولية للمعايير (ISO) سنة 1983 برقم 7498 ليكون نموذج نظري موثوق للاتصالات مقسم لـ 7 طبقات.</p>
                        
                        <h2 style="color: #1e293b;">فائدة فهم طبقات OSI:</h2>
                        <ul>
                            <li>تستطيع فهم وحل المشاكل (Troubleshooting) للشبكات.</li>
                            <li>معرفة كيفية تكوين البيانات وما هو شكلها في كل مرحلة.</li>
                            <li>تفيد بمعرفة النقاط الحساسة وكيفية تشفير وفك البيانات.</li>
                            <li>معرفة كل جهاز في أية طبقة يعمل (مثل HUB والراوتر والسويتش).</li>
                        </ul>

                        <h2 style="text-align: center; margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 2rem; color: #1e293b;">الطبقات السبع (OSI Layers)</h2>
                        <div class="space-y-4 font-sans mt-6">
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-red-500 hover:bg-white transition"><span class="text-4xl font-black text-red-300 w-12 text-center">7</span><div><h4 class="text-xl font-black text-slate-800">Application (طبقة التطبيقات)</h4><p class="font-bold text-sm text-slate-600 mt-1">التطبيقات التي نستخدمها لإرسال الرسائل وتعتبر واجهة المستخدم للشبكة. بروتوكولات: HTTP (ويب), FTP (ملفات), SMTP (بريد).</p></div></div>
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-orange-500 hover:bg-white transition"><span class="text-4xl font-black text-orange-300 w-12 text-center">6</span><div><h4 class="text-xl font-black text-slate-800">Presentation (طبقة التقديم)</h4><p class="font-bold text-sm text-slate-600 mt-1">تهيئة البيانات وتحديد امتدادها (نصوص، صور)، وعمل التشفير وفك التشفير والضغط. بروتوكولات: JPEG, HTML.</p></div></div>
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-yellow-500 hover:bg-white transition"><span class="text-4xl font-black text-yellow-400 w-12 text-center">5</span><div><h4 class="text-xl font-black text-slate-800">Session (طبقة الجلسة)</h4><p class="font-bold text-sm text-slate-600 mt-1">إدارة وفتح وإغلاق الاتصال وتحديد نوعه إرسال واستقبال (Simplex, Half Duplex, Full Duplex). بروتوكولات: NFS, SQL.</p></div></div>
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-emerald-500 hover:bg-white transition"><span class="text-4xl font-black text-emerald-400 w-12 text-center">4</span><div><h4 class="text-xl font-black text-slate-800">Transport (طبقة النقل)</h4><p class="font-bold text-sm text-slate-600 mt-1">تحديد البروتوكول المناسب لنقل البيانات وتقطيعها (Segment) وضمانها. بروتوكولات: TCP (للملفات), UDP (للصوت والفيديو).</p></div></div>
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-blue-500 hover:bg-white transition"><span class="text-4xl font-black text-blue-400 w-12 text-center">3</span><div><h4 class="text-xl font-black text-slate-800">Network (طبقة الشبكة)</h4><p class="font-bold text-sm text-slate-600 mt-1">إضافة عنوان IP للمرسل والمستقبل، واختيار مسار التوجيه (Routing). الجهاز: الراوتر. شكل البيانات: Packet.</p></div></div>
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-indigo-500 hover:bg-white transition"><span class="text-4xl font-black text-indigo-400 w-12 text-center">2</span><div><h4 class="text-xl font-black text-slate-800">Data Link (طبقة ربط البيانات)</h4><p class="font-bold text-sm text-slate-600 mt-1">إضافة معلومات التحكم لاكتشاف الأخطاء واستخدام العنوان الفيزيائي (MAC Address). الجهاز: السويتش. شكل البيانات: Frame.</p></div></div>
                            <div class="bg-white/80 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-purple-500 hover:bg-white transition"><span class="text-4xl font-black text-purple-400 w-12 text-center">1</span><div><h4 class="text-xl font-black text-slate-800">Physical (الطبقة الفيزيائية)</h4><p class="font-bold text-sm text-slate-600 mt-1">تحويل البيانات إلى إشارات (Bits) كهربائية/ضوئية لتسليمها للكابل عبر كرت الشبكة. الجهاز: Hub, Cables.</p></div></div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card">
                        <div class="bg-emerald-50 p-8 rounded-2xl border border-emerald-100 mb-8">
                            <h2 style="color: #059669; margin-top: 0;">ما هو البروتوكول Protocol؟</h2>
                            <p class="!text-sm">مجموعة من الأكواد البرمجية والقواعد التي تحدد كيف يمكن لأجهزة الكمبيوتر أن تتفاهم مع بعضها عبر الشبكة التي تتواجد عليها، لتسهيل عملية التخاطب.</p>
                        </div>
                        <div class="bg-blue-50 p-8 rounded-2xl border border-blue-100 mb-10">
                            <h2 style="color: #1d4ed8; margin-top: 0;">تغليف البيانات (Encapsulation)</h2>
                            <p class="!text-sm mb-2">تسمى العملية التي تضيف فيها البروتوكولات الترويسات (Header) والتذييل (Trailer) على البيانات بعملية تغليف البيانات، وهذا ما يحدث في عملية الإرسال نزولاً للطبقة الأولى.</p>
                            <p class="!text-sm font-black text-blue-900">في عملية الاستقبال تسمى عملية فك التغليف (De-Encapsulation) وتحدث صعوداً للطبقة السابعة.</p>
                        </div>
                        
                        <h2 style="text-align: center; border-top: 2px solid #f1f5f9; padding-top: 1.5rem; margin-top: 2rem; color: #1e293b;">أنواع الاتصالات في طبقة الجلسة</h2>
                        <div class="grid md:grid-cols-3 gap-6 text-center mt-6">
                            <div class="bg-white/80 p-6 rounded-2xl border border-slate-200 shadow-sm hover-scale"><i class="fas fa-arrow-right text-4xl text-rose-500 mb-4 block drop-shadow-sm"></i><h4 class="font-black text-xl mb-2 text-slate-800">Simplex</h4><p class="text-xs font-bold text-slate-500 leading-relaxed">إرسال في اتجاه واحد فقط يرسل مرة واحدة مثل الراديو والتلفزيون.</p></div>
                            <div class="bg-white/80 p-6 rounded-2xl border border-slate-200 shadow-sm hover-scale"><i class="fas fa-exchange-alt text-4xl text-yellow-500 mb-4 block drop-shadow-sm"></i><h4 class="font-black text-xl mb-2 text-slate-800">Half Duplex</h4><p class="text-xs font-bold text-slate-500 leading-relaxed">إرسال واستقبال ولكن ليس في نفس الوقت مثل أجهزة الشرطة (اللاسلكي).</p></div>
                            <div class="bg-white/80 p-6 rounded-2xl border border-slate-200 shadow-sm hover-scale"><i class="fas fa-arrows-alt-h text-4xl text-emerald-500 mb-4 block drop-shadow-sm"></i><h4 class="font-black text-xl mb-2 text-slate-800">Full Duplex</h4><p class="text-xs font-bold text-slate-500 leading-relaxed">استقبال وإرسال بخط واحد في نفس الوقت مثل الاتصال بالجوال.</p></div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card">
                        <h1 style="text-align: center; color: #1e293b;">مقارنات هامة في الشبكات</h1>
                        
                        <h2 style="color: #1d4ed8;">الفروق بين TCP و UDP (في طبقة النقل)</h2>

                content: [
                    `<div class="rich-display glass-card">
                        <h1 style="color: #7e22ce;">ما هو الكابل؟</h1>
                        <p>الكابل هو الوسيط الذي تنتقل من خلاله البيانات والمعلومات من حاسب إلى آخر في الشبكة أو من شبكة إلى شبكة أخرى.</p>
                        
                        <h2 style="text-align: center; margin-top: 2.5rem; color: #1e293b;">أنواع كبلات الشبكات الأساسية</h2>

                                <p class="custom-grid-desc">يتكون من 8 أزواج ملفوفة لتقليل التشويش. ينقسم لمحمي (STP) بقصدير، وغير محمي (UTP). وهو المعيار الأشهر للشبكات المحلية.</p>

        window.saveArticle = async () => {
            const docId = document.getElementById('edit-doc-id').value;
            const sectionId = document.getElementById('cms-section').value;
            const order = parseInt(document.getElementById('cms-order').value) || 1;
            const tabName = document.getElementById('cms-tab-name').value.trim();
            const htmlContent = document.getElementById('cms-content').innerHTML;

            if(!tabName || !htmlContent || htmlContent.trim() === '') return toast("أدخل العنوان والمحتوى", "error");

            const payload = { sectionId, tabName, htmlContent, order, timestamp: new Date().toISOString() };

            try {
                if(docId && docId.startsWith('core_')) {
                    await setDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس الأساسي بنجاح!");
                } else if(docId) { 
                    await updateDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس بنجاح!"); 
                } else { 
                    await addDoc(collection(db, PATH, 'articles'), payload); toast("تم نشر الدرس بنجاح!"); 
                }
                resetCMSForm(); loadCmsList(); fetchCloudArticles(); 
            } catch(e) { toast("خطأ في الحفظ", "error"); }
        };

            if(t==='short-answer'){ oc.style.display='none'; c.placeholder="اكتب النص الصحيح"; }
            else if(t==='true-false'){ oc.style.display='grid'; b.querySelector('.o1').value="صح"; b.querySelector('.o2').value="خطأ"; b.querySelector('.o3').style.display=b.querySelector('.o4').style.display='none'; c.placeholder="1 لصح، 2 لخطأ"; }
            else { oc.style.display='grid'; b.querySelector('.o3').style.display=b.querySelector('.o4').style.display='block'; c.placeholder=t==='multiple-answers'?"أرقام مفصولة (1,3)":"رقم الإجابة"; }
        };

        window.saveQuiz = async () => {
            const title = document.getElementById('quiz-t').value.trim(); if(!title) return toast("أدخل عنوان الاختبار", "error");
            let qs = [], ok = true; document.querySelectorAll('.q-form-block').forEach(b => { 
                const ty = b.querySelector('.q-ty').value, tx = b.querySelector('.q-t').innerHTML.trim(), crRaw = b.querySelector('.q-c').value.trim();
                if(!tx || !crRaw) { ok = false; return; }
                let opts = [], cr = crRaw;
                if(ty !== 'short-answer') { opts = [b.querySelector('.o1').value, b.querySelector('.o2').value, b.querySelector('.o3').value, b.querySelector('.o4').value].filter(x=>x); if(ty==='true-false') opts.length=2; }
                if(ty === 'multiple-answers') cr = crRaw.split(',').map(n=>parseInt(n.trim())-1); else if(ty!=='short-answer') cr = parseInt(crRaw)-1;
                qs.push({ type: ty, text: tx, options: opts, correctAnswer: cr }); 
            });
            if(!qs.length || !ok) return toast("تأكد من تعبئة جميع الحقول", "error");
            try { await addDoc(collection(db, PATH, 'quizzes'), { title, questions: qs, createdAt: new Date().toISOString() }); toast("تم الحفظ سحابياً بنجاح"); renderDash(); } catch(e){toast("خطأ","error");}
        };

        window.renderStudentPortal = async () => {
            document.getElementById('lms-area').innerHTML = `
            <div class="max-w-4xl mx-auto"><div class="glass-card p-6 flex items-center gap-4 mb-10"><div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl"><i class="fas fa-user-edit"></i></div><input type="text" id="student-n" class="w-full bg-transparent border-none text-xl font-black text-slate-800 focus:outline-none placeholder:text-slate-400" placeholder="أدخل اسمك الثلاثي للبدء.."></div><h3 class="text-2xl font-black mb-6 text-slate-800 border-b border-slate-200 pb-3">الاختبارات المتاحة:</h3><div id="quizzes-grid" class="grid md:grid-cols-2 gap-6 text-center text-slate-500 font-bold"><div class="col-span-full py-10"><i class="fas fa-spinner fa-spin text-5xl mb-4 text-blue-500"></i><br>جاري جلب الاختبارات..</div></div></div>`;
            try {
                const s = await getDocs(collection(db, PATH, 'quizzes')); quizzesCache = []; s.forEach(d => quizzesCache.push({id:d.id, ...d.data()}));
                const qg = document.getElementById('quizzes-grid');
                if(!quizzesCache.length) qg.innerHTML = '<p class="col-span-full bg-white p-10 rounded-[2rem] border border-slate-200 text-lg shadow-sm">لا توجد اختبارات متاحة حالياً.</p>';
                else qg.innerHTML = quizzesCache.map(q => `
                    <div onclick="startQuiz('${q.id}')" class="glass-card p-8 border-t-[8px] border-blue-500 cursor-pointer hover-scale text-center flex flex-col items-center">
                        <h4 class="font-black text-2xl mb-4 text-blue-800">${q.title}</h4><p class="text-sm font-bold text-slate-600 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 mt-auto w-full"><i class="fas fa-list-ol text-blue-500 ml-1"></i> ${q.questions.length} أسئلة تقييمية</p>
                    </div>`).join('');
            } catch(e) { document.getElementById('quizzes-grid').innerHTML = '<p class="col-span-full text-red-500 text-lg font-bold">خطأ في جلب الاختبارات.</p>'; }
        };

        window.startQuiz = id => {
            const n = document.getElementById('student-n').value.trim(); if(!n) return toast("يرجى كتابة الاسم أولاً", "error");
            const q = quizzesCache.find(x => x.id === id); activeQuiz = q;
            document.getElementById('lms-area').innerHTML = `<div class="glass-card max-w-4xl mx-auto p-10 md:p-16 border-t-[15px] border-blue-600 shadow-2xl"><div class="flex justify-between items-center mb-12 border-b-2 border-slate-100 pb-6"><h2 class="text-3xl md:text-4xl font-black text-blue-900">${q.title}</h2><button onclick="renderStudentPortal()" class="text-red-500 bg-red-50 hover:bg-red-500 hover:text-white p-3 rounded-xl transition shadow-sm"><i class="fas fa-times text-xl"></i></button></div><div id="q-render-area" class="space-y-12"></div><button onclick="processSubmit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-2xl font-black text-2xl shadow-xl mt-12 transition">تسليم الإجابات <i class="fas fa-paper-plane ml-2"></i></button></div>`;
            
            document.getElementById('q-render-area').innerHTML = q.questions.map((qu, i) => {
                let optsHtml = '';
                if(qu.type === 'short-answer') optsHtml = `<input type="text" class="w-full p-5 bg-white border border-slate-300 rounded-xl text-slate-800 font-black focus:border-blue-500 outline-none tin text-lg shadow-inner" placeholder="اكتب إجابتك هنا..">`;
                else if(qu.type === 'multiple-answers') optsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${qu.options.map((o, j) => `<label class="p-5 border border-slate-200 bg-white rounded-2xl flex items-center gap-4 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition shadow-sm"><input type="checkbox" class="w-6 h-6 rounded border-slate-300 text-blue-600 focus:ring-blue-500" value="${j}"> <span class="font-bold text-lg text-slate-700">${o}</span></label>`).join('')}</div>`;
                else optsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${qu.options.map((o, j) => `<div onclick="selectOpt(this)" class="p-5 border border-slate-200 bg-white rounded-2xl cursor-pointer opt-box hover:border-blue-400 hover:bg-blue-50 font-bold text-lg text-slate-700 transition shadow-sm" data-v="${j}">${o}</div>`).join('')}</div>`;
                
                return `<div class="p-8 md:p-10 bg-slate-50 border border-slate-200 rounded-[3rem] q-entry shadow-sm" data-i="${i}" data-ty="${qu.type}" data-cr="${typeof qu.correctAnswer==='object'?qu.correctAnswer.join(','):qu.correctAnswer}">
                    <div class="text-xl md:text-2xl font-black mb-8 leading-relaxed text-slate-800 rich-display p-0 border-none bg-transparent min-h-0 h-auto inline shadow-none">${i+1}. ${qu.text}</div> ${qu.type==='multiple-answers'?'<span class="text-xs bg-blue-100 text-blue-800 px-3 py-1.5 rounded-lg ml-2 font-black align-top shadow-sm border border-blue-200">(متعدد)</span>':''}
                    <div class="mt-6">${optsHtml}</div>
                </div>`;
            }).join('');
            window.smoothScrollTop();
        };

        window.selectOpt = el => { el.parentElement.querySelectorAll('.opt-box').forEach(x => x.classList.remove('bg-blue-600', 'border-blue-600', 'text-white', 'active-opt')); el.classList.add('bg-blue-600', 'border-blue-600', 'text-white', 'active-opt'); el.classList.remove('text-slate-700', 'bg-white'); };

        window.processSubmit = async () => {
            let score = 0, allAnswered = true;
            document.querySelectorAll('.q-entry').forEach(e => { 
                const ty = e.dataset.ty, cr = e.dataset.cr;
                if(ty === 'short-answer') { const v = e.querySelector('.tin').value.trim(); if(!v) allAnswered=false; else if(v.toLowerCase()===cr.toLowerCase()) score++; }
                else if(ty === 'multiple-answers') { const chks = Array.from(e.querySelectorAll('input:checked')).map(c=>c.value), cra = cr.split(','); if(!chks.length) allAnswered=false; else if(chks.length===cra.length && chks.every(v=>cra.includes(v))) score++; }
                else { const s = e.querySelector('.active-opt'); if(!s) allAnswered=false; else if(s.dataset.v===cr) score++; }
            });
            if(!allAnswered) return toast("الرجاء الإجابة على كافة الأسئلة أولاً", "error");

            try {
                await addDoc(collection(db, PATH, 'results'), { studentName: document.getElementById('student-n').value, quizTitle: activeQuiz.title, score, total: activeQuiz.questions.length, timestamp: new Date().toISOString() });
                document.getElementById('lms-area').innerHTML = `
                <div class="glass-card max-w-lg mx-auto text-center p-16 border-t-[16px] ${score===activeQuiz.questions.length?'border-yellow-500':'border-emerald-500'} shadow-2xl">
                    <i class="fas ${score===activeQuiz.questions.length?'fa-trophy text-yellow-500':'fa-star text-emerald-500'} text-9xl mb-8 drop-shadow-lg"></i>
                    <h2 class="text-4xl font-black mb-4 text-slate-800">النتيجة النهائية</h2>
                    <p class="font-bold text-slate-500 text-xl mb-8">أحسنت يا ${document.getElementById('student-n').value}</p>
                    <div class="text-[100px] font-black text-blue-600 mb-10 bg-blue-50 py-6 rounded-[3rem] border border-blue-200 shadow-inner">${score}<span class="text-5xl text-slate-400 mx-3">/</span><span class="text-6xl text-slate-500">${activeQuiz.questions.length}</span></div>
                    <button onclick="renderStudentPortal()" class="bg-slate-800 text-white w-full py-5 rounded-2xl font-black text-2xl transition hover:bg-slate-700 shadow-xl">العودة لقائمة الاختبارات</button>
                </div>`;
                window.smoothScrollTop();
            } catch(e) { toast("حدث خطأ أثناء حفظ النتيجة", "error"); }
        };

        window.loadRes = async () => {
            const list = document.getElementById('res-list'); list.innerHTML = '<p class="text-center font-bold text-slate-400 text-sm"><i class="fas fa-spinner fa-spin text-3xl mb-2"></i><br>جاري التحديث..</p>';
            try {
                const s = await getDocs(collection(db, PATH, 'results')); let results = []; s.forEach(d => results.push(d.data()));
                results.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                if(!results.length) return list.innerHTML = '<p class="text-center text-slate-500 font-bold text-base bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm">لا توجد نتائج مسجلة حتى الآن.</p>';
                list.innerHTML = `<table class="w-full text-right"><tr class="border-b border-slate-200 text-sm font-black text-slate-500"><th class="p-4 bg-slate-50 rounded-tr-xl">اسم المتدرب</th><th class="p-4 bg-slate-50">الاختبار</th><th class="p-4 bg-slate-50 rounded-tl-xl">الدرجة</th></tr>` + 
                    results.map(r => `<tr class="border-b border-slate-100 hover:bg-slate-50 transition"><td class="py-4 px-4 font-black text-base text-slate-800">${r.studentName}</td><td class="py-4 px-4 text-slate-600 font-bold text-sm">${r.quizTitle}</td><td class="py-4 px-4 font-mono text-blue-600 text-lg font-black"><span class="bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">${r.score}/${r.total}</span></td></tr>`).join('') + `</table>`;
            } catch(e) { list.innerHTML = '<p class="text-red-500 font-bold text-center text-base">خطأ في الجلب.</p>'; }
        };

        window.impJ = e => { const r = new FileReader(); r.onload = ev => { try { JSON.parse(ev.target.result).forEach(q => { window.addQForm(); const l = document.getElementById('quiz-c').lastChild; l.querySelector('.q-ty').value=q.type||'multiple-choice'; window.updTy(l.querySelector('.q-ty')); l.querySelector('.q-t').innerHTML = q.text; if(q.options) { l.querySelector('.o1').value = q.options[0]||''; l.querySelector('.o2').value = q.options[1]||''; l.querySelector('.o3').value = q.options[2]||''; l.querySelector('.o4').value = q.options[3]||''; } let cc = q.correctAnswer; if(typeof cc==='object') cc=cc.map(n=>n+1).join(','); else if(q.type!=='short-answer') cc++; l.querySelector('.q-c').value = cc; }); toast("تم الاستيراد بنجاح"); } catch(e){toast("خطأ في ملف JSON","error");} }; r.readAsText(e.target.files[0]); };
    </script>
</body>
</html>
