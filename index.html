<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكلية التقنية بالمندق | قسم تقنية الشبكات</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@400;700;900&family=Almarai:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Cairo', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'],
                        tajawal: ['Tajawal', 'sans-serif'],
                        almarai: ['Almarai', 'sans-serif']
                    },
                    colors: { 
                        /* ألوان الهوية البصرية TVTC */
                        tvtcdark: '#004d60',
                        tvtcmain: '#00627a',
                        tvtclight: '#0083a3',
                        tvtcteal: '#29b5a8',
                        tvtcaccent: '#4bd5c9'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            /* إعدادات الخلفية الشاملة مع الصورة المرفقة */
            .site-bg { 
                background-image: url('bakground.jpg'); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-color: #e2e8f0; 
            }
            
            /* البطاقات الزجاجية الشفافة متطابقة مع الهوية - شفافية 60% مع تأثير ضبابي */
            .glass-card { @apply bg-white/60 backdrop-blur-lg border border-white/50 shadow-[0_8px_30px_rgb(0,0,0,0.1)] rounded-[2rem] overflow-hidden; }
            .hover-scale { @apply transition-all duration-300 hover:-translate-y-1.5 hover:shadow-2xl hover:border-tvtcteal hover:bg-white/75; }
            
            /* تصميم القائمة الجانبية (Sidebar) */
            .sidebar-bg { @apply bg-white/65 backdrop-blur-2xl border-l border-white/50 shadow-2xl; }
            .sidebar-item { @apply flex items-center gap-3 px-5 py-3.5 w-full text-right font-black text-tvtcmain rounded-xl transition cursor-pointer border-r-4 border-transparent hover:bg-white/60 hover:text-tvtcdark shadow-sm mb-1; }
            .sidebar-item.active { @apply bg-tvtcmain/90 backdrop-blur-sm text-white border-tvtcdark shadow-md; }
            .sidebar-item.active i { @apply text-white; }
            .sub-tab { @apply block w-full text-right px-10 py-2.5 text-sm font-bold text-slate-700 hover:text-tvtcteal transition cursor-pointer hover:bg-white/60 rounded-lg; }
            .sub-tab.active { @apply text-tvtcmain border-r-4 border-tvtcteal bg-white/80 shadow-sm; }
            
            /* الأزرار الموحدة */
            .btn-primary { @apply w-full bg-tvtcteal hover:bg-tvtcmain text-white font-black py-4 rounded-xl transition shadow-lg shadow-tvtcteal/40 backdrop-blur-sm; }
            
            /* تنسيقات محرر النصوص */
            .editor-toolbar { @apply bg-white/80 backdrop-blur-md p-3 rounded-t-2xl flex flex-wrap gap-2 items-center border border-white/50 border-b-0 shadow-inner w-full; }
            .editor-toolbar button, .editor-toolbar select { @apply bg-white hover:bg-tvtcmain hover:text-white text-slate-800 px-2.5 py-1.5 rounded-lg cursor-pointer transition text-sm font-bold border border-slate-200 outline-none shadow-sm flex items-center gap-1; }
            .editor-toolbar input[type="color"] { @apply bg-white border border-slate-200 cursor-pointer w-8 h-8 p-0.5 rounded-lg shadow-sm; }
            
            .rich-editor, .rich-display { @apply w-full p-8 bg-white/70 backdrop-blur-sm border border-white/50 rounded-b-2xl text-slate-900 outline-none overflow-y-auto leading-loose text-lg font-medium shadow-sm; }
            .rich-editor { @apply min-h-[500px] resize-y; }
            
            .rich-editor h1, .rich-display h1 { @apply font-black mb-4 mt-4 text-tvtcdark; }
            .rich-editor h2, .rich-display h2 { @apply font-black mb-4 mt-4 text-tvtcmain; }
            .rich-editor h3, .rich-display h3 { @apply font-black mb-3 mt-3 text-tvtcteal; }
            .rich-editor p, .rich-display p { @apply mb-4 text-justify; }
            .rich-editor ul, .rich-display ul { @apply list-disc list-inside mb-6 mr-4 space-y-2 font-bold text-slate-800; }
            .rich-editor ol, .rich-display ol { @apply list-decimal list-inside mb-6 mr-4 space-y-2 font-bold text-slate-800; }
            
            .rich-editor table, .rich-display table { @apply w-full text-center border-collapse bg-white/80 mb-8 rounded-2xl overflow-hidden shadow-sm border border-slate-300; }
            .rich-editor th, .rich-display th { @apply bg-tvtclight/20 p-4 border-b border-slate-300 font-black text-lg text-tvtcmain; }
            .rich-editor td, .rich-display td { @apply p-4 border-b border-slate-300 font-bold text-slate-800; }
            .rich-editor img, .rich-display img { @apply max-w-full h-auto rounded-xl shadow-md my-4 object-contain inline-block border border-slate-200 cursor-move resize; }
            
            .rich-editor font[size="3"], .rich-display font[size="3"] { font-size: 1rem; }
            .rich-editor font[size="5"], .rich-display font[size="5"] { font-size: 1.5rem; font-weight: bold; }
            .rich-editor font[size="6"], .rich-display font[size="6"] { font-size: 2rem; font-weight: 900; }
            .rich-editor font[size="7"], .rich-display font[size="7"] { font-size: 2.5rem; font-weight: 900; }

            /* الكروت الجاهزة */
            .custom-grid-container { @apply grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 my-8 text-center items-stretch; }
            .custom-grid-card { @apply bg-white/70 backdrop-blur-md border-t-[6px] border-tvtcteal p-8 rounded-[2rem] shadow-sm transition hover:-translate-y-1 hover:shadow-md flex flex-col h-full; }
            .custom-grid-title { @apply text-xl font-black mb-3 text-tvtcmain; }
            .custom-grid-desc { @apply text-sm font-bold leading-relaxed flex-grow text-slate-700; }
        }
        .page-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast { @apply fixed bottom-5 left-5 z-[9999] opacity-0 translate-y-10 transition-all duration-300 bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl text-slate-800; }
        .toast.show { @apply opacity-100 translate-y-0; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #29b5a8; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-tvtcteal selection:text-white flex flex-col h-screen site-bg overflow-hidden relative">

    <!-- طبقة زجاجية خفيفة جداً لضمان القراءة مع بقاء الصورة الخلفية شديدة الوضوح -->
    <div class="absolute inset-0 bg-white/10 backdrop-blur-[2px] -z-10"></div>

    <!-- الشريط العلوي الموحد (النافبار) -->
    <nav class="bg-gradient-to-r from-tvtcdark via-tvtcmain to-tvtcteal p-4 sticky top-0 z-50 shadow-md flex justify-between items-center shrink-0 w-full">
        <!-- اليمين: الشعار واسم الموقع -->
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('main-sidebar').classList.remove('hidden')" class="lg:hidden text-white hover:text-tvtcaccent text-2xl p-1 transition"><i class="fas fa-bars"></i></button>
            <div class="font-black text-white text-lg md:text-xl flex items-center gap-3 cursor-pointer hover:opacity-80 transition" onclick="window.goHome()">
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm border border-white/30"><i class="fas fa-network-wired"></i></div>
                <span class="hidden sm:inline tracking-wide">الكلية التقنية بالمندق / قسم تقنية الشبكات</span>
                <span class="sm:hidden tracking-wide">الكلية التقنية</span>
            </div>
        </div>

        <!-- اليسار: أزرار التقييم وإدارة الموقع (العلوي الأيسر) -->
        <div class="flex items-center gap-3 md:gap-4">
            <button onclick="window.directLMS('admin')" class="text-white/90 hover:text-white font-bold transition text-xs md:text-sm flex items-center gap-1.5 bg-white/10 hover:bg-white/20 px-4 py-2.5 rounded-xl border border-white/20 shadow-sm"><i class="fas fa-cog"></i> <span class="hidden md:inline">إدارة الموقع</span><span class="md:hidden">إدارة</span></button>
            <button onclick="window.directLMS('student')" class="text-tvtcmain bg-white hover:bg-slate-100 font-black transition text-xs md:text-sm flex items-center gap-1.5 px-4 py-2.5 rounded-xl shadow-sm"><i class="fas fa-user-graduate"></i> <span class="hidden md:inline">الواجبات والاختبارات</span><span class="md:hidden">الاختبارات</span></button>
            <div class="w-px h-6 bg-white/30 hidden md:block mx-1"></div>
            <button onclick="window.toggleFS()" class="hidden md:flex text-white/90 hover:text-white text-lg transition p-2"><i class="fas fa-expand" id="fs-icon"></i></button>
        </div>
    </nav>

    <!-- المساحة الوسطى (القائمة + العرض) -->
    <div class="flex-1 flex h-full overflow-hidden w-full relative">
        
        <!-- القائمة الجانبية (Sidebar) -->
        <aside id="main-sidebar" class="w-72 md:w-80 sidebar-bg z-[100] flex-col hidden fixed inset-y-0 right-0 lg:static lg:flex h-full flex-shrink-0 transition-transform duration-300">
            <div class="p-4 flex justify-end lg:hidden">
                <button onclick="document.getElementById('main-sidebar').classList.add('hidden')" class="text-slate-500 hover:text-red-500 text-2xl bg-white/70 w-10 h-10 rounded-xl shadow-sm"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2 mt-2" id="sidebar-nav">
                <!-- سيتم توليد الروابط هنا برمجياً -->
            </nav>
            
            <div class="p-6 border-t border-white/40 bg-white/50 text-center shrink-0">
                <p class="text-xs font-black text-tvtcmain leading-relaxed uppercase tracking-widest mb-1">إعداد وتصميم</p>
                <p class="text-tvtcdark font-black drop-shadow-sm text-lg">منصور مستور الزهراني</p>
            </div>
        </aside>

        <!-- منطقة التمرير للمحتوى الرئيسي -->
        <main id="main-scroll-area" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            
            <!-- الواجهة الرئيسية -->
            <div id="portal-dashboard" class="block page-enter max-w-7xl mx-auto">
                <header class="glass-card p-10 md:p-16 text-center border-t-[8px] border-tvtcmain mb-12 relative overflow-hidden bg-white/60">
                    <div class="relative z-10 w-full">
                        <div id="home-rich-content" class="w-full mx-auto rich-display bg-transparent border-none shadow-none text-center h-auto min-h-0 p-0">
                            <!-- المحتوى الافتراضي للرئيسية -->
                            <img src="tvtc.png" alt="TVTC Logo" style="height: 140px; margin: 0 auto 25px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); object-fit: contain;">
                            <h1 class="text-5xl md:text-7xl font-black mb-8 text-tvtcdark tracking-tight drop-shadow-md">شبكات <span class="text-tvtcteal">الحاسب الآلي</span></h1>
                            <p class="text-lg md:text-2xl text-tvtcmain max-w-4xl mx-auto font-bold leading-relaxed drop-shadow-sm">المرجع الأكاديمي الشامل لمهندسي الشبكات، يغطي المبادئ، الأمان، بروتوكولات التوجيه، والمعايير الفيزيائية.</p>
                        </div>
                    </div>
                </header>
                
                <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- سيتم تعبئة البطاقات هنا برمجياً -->
                </div>
            </div>

            <!-- حاوية الأقسام التعليمية -->
            <div id="section-container" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="glass-card p-8 md:p-10 mb-8 text-center border-t-[8px] border-tvtcmain bg-white/60">
                    <h1 id="section-title" class="text-4xl md:text-5xl font-black text-tvtcdark tracking-tight drop-shadow-sm">العنوان</h1>
                </header>

                <div id="mobile-tabs" class="lg:hidden flex gap-2 overflow-x-auto custom-scrollbar mb-8 pb-2"></div>
                
                <div id="content-area" class="w-full page-enter">
                    <!-- المحتوى سيحقن هنا -->
                </div>
            </div>

            <!-- قسم الاختبارات والتعديل (CMS/LMS Views) -->
            <div id="section-exams" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <div id="lms-area"></div>
            </div>

        </main>
    </div>

    <div id="tst" class="toast"><i id="tsti" class="fas"></i><span id="tstt"></span></div>

    <!-- بيانات المحتوى الأساسية (منسقة 100% بألوان TVTC ومكتملة) -->
    <script>
        const CORE_DATA = {
            'networks': {
                title: 'مبادئ شبكات الحاسب', icon: 'fa-globe', color: 'tvtcmain', desc: 'مفهوم الشبكة، المكونات، الفوائد، والتصاميم الهندسية بالكامل.',
                tabs: ['مفهوم الشبكة والفوائد', 'المكونات والوسائط', 'التصاميم الجغرافية والمعمارية'],
                content: [
                    `<div class="rich-display glass-card border-t-[6px] border-tvtcteal">
                        <h1>🌐 ماهي شبكة الحاسب؟</h1>
                        <p style="text-align: justify;">شبكة الحاسب (Computer Network) عبارة عن مجموعة من الحاسبات والأجهزة الأخرى المتصلة مع بعضها البعض حيث يكون لها القدرة على مشاركة عدد كبير من المستخدمين للبيانات (Data) والأجهزة (Hardware) كما تعتبر الشبكة وسيلة اتصال الكتروني بين الأفراد.</p>
                        
                        <h2 style="text-align: center; margin-top: 2rem;">💡 فوائد شبكات الحاسب</h2>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-t-tvtcmain">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">💾</div>
                                <div class="custom-grid-title text-tvtcdark">مشاركة البيانات</div>
                                <p class="custom-grid-desc text-center">نقل المعلومات والملفات بسرعة فائقة بين المستخدمين دون وسائط تخزين خارجية.</p>
                            </div>
                            <div class="custom-grid-card border-t-tvtcteal">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🖨️</div>
                                <div class="custom-grid-title text-tvtcdark">مشاركة الموارد</div>
                                <p class="custom-grid-desc text-center">تتيح للجميع استخدام أجهزة صلبة (Hardware) مثل الطابعات والماسحات الضوئية.</p>
                            </div>
                            <div class="custom-grid-card border-t-purple-500">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">💻</div>
                                <div class="custom-grid-title text-tvtcdark">مشاركة البرمجيات</div>
                                <p class="custom-grid-desc text-center">العمل على برامج موحدة (Software) بتثبيت نسخة واحدة على الخادم للجميع.</p>
                            </div>
                            <div class="custom-grid-card md:col-span-1 lg:col-span-1 border-t-orange-500">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">📂</div>
                                <div class="custom-grid-title text-tvtcdark">مشاركة الملفات مباشرة</div>
                                <p class="custom-grid-desc text-center">نقل مباشر بين الأجهزة بدلاً من إرسالها عبر البريد الإلكتروني.</p>
                            </div>
                            <div class="custom-grid-card md:col-span-2 lg:col-span-2 border-t-rose-500 bg-white/80">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🎮</div>
                                <div class="custom-grid-title !text-rose-700">ألعاب الكمبيوتر الجماعية</div>
                                <p class="custom-grid-desc text-center">التفاعل بين أكثر من مستخدم (Multiplayer) للعب في نفس البيئة الافتراضية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card border-t-[8px] border-tvtcmain">
                        <h1 style="text-align: center;">🖥️ مكونات شبكة الحاسب</h1>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-t-tvtcmain">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">💻</div>
                                <div class="custom-grid-title">الأجهزة الطرفية</div>
                                <div style="font-weight: 900; color: #00627a; margin-bottom: 1rem; background: rgba(255,255,255,0.8); padding: 0.5rem; border-radius: 0.5rem; text-align: center; border: 1px solid #29b5a8;">End Devices</div>
                                <p class="custom-grid-desc text-justify">الجهاز الطرفي: هو المكان الذي تنشأ منه الرسالة أو المكان الذي يتم استلامها فيه. تنشأ البيانات باستخدام جهاز طرفي وتتدفق خلال الشبكة وتصل إلى جهاز طرفي آخر. (مثل أجهزة الكمبيوتر، الطابعات الشبكية، الكاميرات).</p>
                            </div>
                            <div class="custom-grid-card border-t-tvtcdark">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🔀</div>
                                <div class="custom-grid-title">الأجهزة الوسيطة</div>
                                <div style="font-weight: 900; color: #00627a; margin-bottom: 1rem; background: rgba(255,255,255,0.8); padding: 0.5rem; border-radius: 0.5rem; text-align: center; border: 1px solid #29b5a8;">Intermediary</div>
                                <p class="custom-grid-desc text-justify">تقوم بالاتصال البيني بين الأجهزة الطرفية وتوجيه الحزم واختيار المسار وحماية الشبكة. من الأمثلة عليها: أجهزة التبديل (Switch)، أجهزة التوجيه (Router)، الجدران النارية (Firewalls).</p>
                            </div>
                            <div class="custom-grid-card border-t-tvtcteal">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">📡</div>
                                <div class="custom-grid-title">وسائط الشبكة</div>
                                <div style="font-weight: 900; color: #00627a; margin-bottom: 1rem; background: rgba(255,255,255,0.8); padding: 0.5rem; border-radius: 0.5rem; text-align: center; border: 1px solid #29b5a8;">Media</div>
                                <p class="custom-grid-desc text-justify">يتم نقل الاتصالات عبر الشبكة من خلال وسيط يسمح للرسالة بالانتقال من المصدر إلى الوجهة. وتشمل: الكابلات النحاسية، كابلات الألياف الضوئية، والموجات اللاسلكية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card border-t-[8px] border-tvtcmain">
                        <h2 style="text-align: center;">🌍 الشبكات من حيث المدى الجغرافي</h2>
                        <div class="custom-grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                            <div class="custom-grid-card border-t-blue-500">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">📱</div>
                                <div class="custom-grid-title text-center text-blue-800">PAN</div>
                                <p class="custom-grid-desc text-center">الشبكة الشخصية لتوصيل الأجهزة في نطاق أمتار كالبلوتوث.</p>
                            </div>
                            <div class="custom-grid-card border-t-emerald-500">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🏢</div>
                                <div class="custom-grid-title text-center text-emerald-800">LAN</div>
                                <p class="custom-grid-desc text-center">الشبكة المحلية داخل منطقة جغرافية محدودة كالمباني والمكاتب.</p>
                            </div>
                            <div class="custom-grid-card border-t-purple-500">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🏙️</div>
                                <div class="custom-grid-title text-center text-purple-800">MAN</div>
                                <p class="custom-grid-desc text-center">الشبكة المتوسطة الإقليمية التي تربط LANs ضمن مدينة واحدة.</p>
                            </div>
                            <div class="custom-grid-card border-t-orange-500">
                                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">🌍</div>
                                <div class="custom-grid-title text-center text-orange-800">WAN</div>
                                <p class="custom-grid-desc text-center">الشبكة الواسعة للربط بين مدن ودول وتغطي مسافات شاسعة.</p>
                            </div>
                        </div>

                        <hr style="margin: 3rem 0; border: 1px solid rgba(0,98,122,0.2);">

                        <div style="display: flex; flex-wrap: wrap; gap: 2rem;">
                            <div style="flex: 1; min-width: 300px;">
                                <h2>🏗️ المعمارية التقنية (Architecture)</h2>

                        <h1 style="color: #004d60;">📚 مرجع OSI (Open Systems Interconnection)</h1>
                        <p style="text-align: justify;">هو مراحل تكون البيانات ونقلها من الجهاز المرسل (Source device) إلى الجهاز المستقبل (Destination device). وضعته المنظمة الدولية للمعايير (ISO) سنة 1983 برقم 7498 ليكون نموذج نظري موثوق للاتصالات مقسم لـ 7 طبقات.</p>

            const payload = { sectionId, tabName, htmlContent, order, timestamp: new Date().toISOString() };

                    await setDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس الأساسي بنجاح!");
                } else if(docId) { 
                    await updateDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس بنجاح!");

                    const chks = Array.from(e.querySelectorAll('input:checked')).map(c=>c.value); 
                    if(chks.length > 0) { answered = true; const cra = String(cr).split(','); if(chks.length===cra.length && chks.every(v=>cra.includes(v))) score++; } 
                }
                else { 
                    const s = e.querySelector('.active-opt');

                }

                if(!window.loadedResults.length) return list.innerHTML = '<p class="text-center text-slate-700 font-bold text-lg bg-white p-8 rounded-3xl border border-slate-300 shadow-sm">لا توجد نتائج مسجلة حتى الآن.</p>';
                list.innerHTML = `<table class="w-full text-right"><tr class="border-b border-slate-300 text-base font-black text-slate-800 bg-slate-100"><th class="p-5 rounded-tr-xl border-r border-slate-300">اسم المتدرب (والرقم)</th><th class="p-5 border-r border-slate-300">الاختبار</th><th class="p-5 rounded-tl-xl">الدرجة</th></tr>` + 
                    window.loadedResults.map(r => `<tr class="border-b border-slate-200 hover:bg-slate-50 transition"><td class="py-5 px-5 font-black text-lg text-slate-900 border-r border-slate-200">${r.studentName} <br><span class="text-sm text-slate-500 font-bold">${r.studentId||''}</span></td><td class="py-5 px-5 text-slate-700 font-bold text-base border-r border-slate-200">${r.quizTitle}</td><td class="py-5 px-5 font-mono text-tvtcmain text-xl font-black"><span class="bg-tvtclight/10 px-4 py-2 rounded-xl border border-tvtcteal/30 shadow-sm">${r.score}/${r.total}</span></td></tr>`).join('') + `</table>`;
            } catch(e) { list.innerHTML = '<p class="text-red-600 font-bold text-center text-lg">خطأ في الجلب.</p>'; }
        };

        window.exportToExcel = () => {
            if(!window.loadedResults || window.loadedResults.length === 0) return toast("لا توجد نتائج للتحميل", "error");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "الاسم,الرقم التدريبي,الاختبار,الدرجة,الدرجة الكلية,التاريخ\n";
            window.loadedResults.forEach(r => {
                let date = new Date(r.timestamp).toLocaleDateString('ar-SA');
                let name = (r.studentName || '').replace(/,/g, ''); 
                let id = (r.studentId || '').replace(/,/g, '');
                let quiz = (r.quizTitle || '').replace(/,/g, '');
                csvContent += `${name},${id},${quiz},${r.score},${r.total},${date}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "نتائج_المتدربين.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.impJ = e => { const r = new FileReader(); r.onload = ev => { try { JSON.parse(ev.target.result).forEach(q => { window.addQForm(); const l = document.getElementById('quiz-c').lastChild; l.querySelector('.q-ty').value=q.type||'multiple-choice'; window.updTy(l.querySelector('.q-ty')); l.querySelector('.q-t').innerHTML = q.text; if(q.options) { l.querySelector('.o1').value = q.options[0]||''; l.querySelector('.o2').value = q.options[1]||''; l.querySelector('.o3').value = q.options[2]||''; l.querySelector('.o4').value = q.options[3]||''; } let cc = q.correctAnswer; if(typeof cc==='object') cc=cc.map(n=>n+1).join(','); else if(q.type!=='short-answer') cc++; l.querySelector('.q-c').value = cc; }); toast("تم الاستيراد بنجاح"); } catch(e){toast("خطأ في ملف JSON","error");} }; r.readAsText(e.target.files[0]); };
    </script>
</body>
</html>
