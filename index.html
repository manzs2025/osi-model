<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكات الحاسب الآلي | منصور مستور الزهراني</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@400;700;900&family=Almarai:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Cairo', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'],
                        tajawal: ['Tajawal', 'sans-serif'],
                        almarai: ['Almarai', 'sans-serif']
                    },
                    colors: { primary: '#ffffff', secondary: '#2563eb', accent: '#0ea5e9' }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            /* إعدادات الخلفية الشاملة مع الصورة المرفقة */
            .site-bg { 
                background-image: url('bakground.jpg'); 
                background-size: cover; 
                background-position: center; 
                background-attachment: fixed; 
                background-color: #e2e8f0; 
            }
            
            /* البطاقات الزجاجية الشفافة بنسبة 50% مع ضبابية لدعم القراءة ورؤية الخلفية */
            .glass-card { @apply bg-white/50 backdrop-blur-md border border-white/40 shadow-[0_8px_30px_rgb(0,0,0,0.05)] rounded-[2rem] overflow-hidden; }
            .hover-scale { @apply transition-all duration-300 hover:-translate-y-1.5 hover:shadow-xl hover:border-blue-300 hover:bg-white/60; }
            
            /* تصميم القائمة الجانبية (Sidebar) شفافة بنسبة 50% */
            .sidebar-bg { @apply bg-white/50 backdrop-blur-lg border-l border-white/40 shadow-xl; }
            .sidebar-item { @apply flex items-center gap-3 px-5 py-3.5 w-full text-right font-black text-slate-700 rounded-xl transition cursor-pointer border-r-4 border-transparent hover:bg-white/50 hover:text-blue-700 shadow-sm mb-1; }
            .sidebar-item.active { @apply bg-blue-600/80 backdrop-blur-sm text-white border-blue-800 shadow-md; }
            .sidebar-item.active i { @apply text-white; }
            .sub-tab { @apply block w-full text-right px-10 py-2.5 text-sm font-bold text-slate-700 hover:text-blue-800 transition cursor-pointer hover:bg-white/50 rounded-lg; }
            .sub-tab.active { @apply text-blue-800 border-r-4 border-blue-500 bg-white/60 shadow-sm; }
            
            .btn-primary { @apply w-full bg-blue-600/90 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition shadow-lg shadow-blue-600/30 backdrop-blur-sm; }
            
            /* تنسيقات محرر النصوص (مكتمل العناصر) */
            .editor-toolbar { @apply bg-white/60 backdrop-blur-md p-3 rounded-t-2xl flex flex-wrap gap-2 items-center border border-white/50 border-b-0 shadow-sm; }
            .editor-toolbar button, .editor-toolbar select { @apply bg-white/80 hover:bg-blue-50 text-slate-700 px-2.5 py-1.5 rounded-lg cursor-pointer transition text-sm font-bold border border-slate-200 outline-none shadow-sm flex items-center gap-1; }
            .editor-toolbar input[type="color"] { @apply bg-white/80 border border-slate-200 cursor-pointer w-8 h-8 p-0.5 rounded-lg shadow-sm; }
            
            /* تكبير المحرر ليكون واضحاً للعمل */
            .rich-editor { @apply w-full p-8 bg-white/60 backdrop-blur-sm border border-white/50 rounded-b-2xl text-slate-900 outline-none overflow-y-auto leading-loose text-lg font-bold shadow-inner min-h-[500px] resize-y; }
            .rich-display { @apply w-full p-8 bg-white/50 backdrop-blur-sm border border-white/40 rounded-b-2xl text-slate-900 outline-none overflow-y-auto leading-loose text-lg font-bold shadow-sm h-auto; }
            
            .rich-editor h1, .rich-display h1 { @apply font-black mb-4 mt-4; }
            .rich-editor h2, .rich-display h2 { @apply font-black mb-4 mt-4; }
            .rich-editor h3, .rich-display h3 { @apply font-black mb-3 mt-3; }
            .rich-editor p, .rich-display p { @apply mb-4 text-justify; }
            .rich-editor ul, .rich-display ul { @apply list-disc list-inside mb-6 mr-4 space-y-2 font-bold; }
            .rich-editor ol, .rich-display ol { @apply list-decimal list-inside mb-6 mr-4 space-y-2 font-bold; }
            
            .rich-editor table, .rich-display table { @apply w-full text-center border-collapse bg-white/70 mb-8 rounded-2xl overflow-hidden shadow-sm border border-slate-300; }
            .rich-editor th, .rich-display th { @apply bg-blue-50/70 p-4 border border-slate-300 font-black text-lg; }
            .rich-editor td, .rich-display td { @apply p-4 border border-slate-300 font-bold; }
            .rich-editor img, .rich-display img { @apply max-w-full h-auto rounded-xl shadow-md my-4 object-contain inline-block border border-slate-200; }
            
            .rich-editor font[size="3"], .rich-display font[size="3"] { font-size: 1rem; }
            .rich-editor font[size="5"], .rich-display font[size="5"] { font-size: 1.5rem; font-weight: bold; }
            .rich-editor font[size="6"], .rich-display font[size="6"] { font-size: 2rem; font-weight: 900; }
            .rich-editor font[size="7"], .rich-display font[size="7"] { font-size: 2.5rem; font-weight: 900; }

            /* الكروت الجاهزة */
            .custom-grid-container { @apply grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 my-8 text-center items-stretch; }
            .custom-grid-card { @apply bg-white/60 backdrop-blur-md border border-white/50 p-8 rounded-[2rem] shadow-sm transition hover:-translate-y-1 hover:shadow-md flex flex-col h-full; }
            .custom-grid-icon { @apply text-5xl mb-4 block mx-auto drop-shadow-sm; }
            .custom-grid-title { @apply text-xl font-black mb-3; }
            .custom-grid-desc { @apply text-sm font-bold leading-relaxed flex-grow; }
        }
        .page-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast { @apply fixed bottom-5 left-5 z-[9999] opacity-0 translate-y-10 transition-all duration-300 bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl text-slate-800; }
        .toast.show { @apply opacity-100 translate-y-0; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-blue-300 selection:text-blue-900 flex h-screen site-bg overflow-hidden relative">

    <!-- القائمة الجانبية (Sidebar) -->
    <aside id="main-sidebar" class="w-72 md:w-80 sidebar-bg z-[100] flex-col hidden fixed inset-y-0 right-0 lg:static lg:flex h-full flex-shrink-0 transition-transform duration-300">
        <div class="p-6 border-b border-white/40 flex items-center justify-between bg-white/20">
            <div class="flex items-center gap-4 cursor-pointer hover:opacity-80 transition" onclick="window.goHome()">
                <div class="bg-blue-600/90 backdrop-blur-md p-3 rounded-2xl shadow-md border border-blue-400/50"><i class="fas fa-network-wired text-white text-xl"></i></div>
                <h1 class="font-black text-slate-900 text-xl tracking-tight drop-shadow-sm">أكاديمية الشبكات</h1>
            </div>
            <button onclick="document.getElementById('main-sidebar').classList.add('hidden')" class="lg:hidden text-slate-600 hover:text-red-600 text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2" id="sidebar-nav">
            <!-- سيتم توليد الروابط هنا برمجياً -->
        </nav>
        
        <div class="p-6 border-t border-white/40 bg-white/30 text-center shrink-0">
            <p class="text-xs font-black text-slate-700 leading-relaxed uppercase tracking-widest mb-1">إعداد وتصميم</p>
            <p class="text-blue-800 font-black drop-shadow-sm">منصور مستور الزهراني</p>
        </div>
    </aside>

    <!-- المساحة الرئيسية للعمل -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative bg-transparent">
        
        <!-- الشريط العلوي للتنقل في الجوال -->
        <nav class="lg:hidden bg-white/60 backdrop-blur-xl p-4 sticky top-0 z-40 border-b border-white/40 shadow-sm flex justify-between items-center">
            <button onclick="document.getElementById('main-sidebar').classList.remove('hidden')" class="text-slate-800 hover:text-blue-700 text-2xl p-2 transition"><i class="fas fa-bars"></i></button>
            <div class="font-black text-blue-900 text-xl flex items-center gap-2 cursor-pointer" onclick="window.goHome()"><i class="fas fa-network-wired text-blue-700"></i> أكاديمية الشبكات</div>
            <button onclick="window.toggleFS()" class="text-slate-800 text-xl p-2"><i class="fas fa-expand" id="fs-icon"></i></button>
        </nav>

        <!-- منطقة التمرير للمحتوى -->
        <main id="main-scroll-area" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            
            <!-- الواجهة الرئيسية -->
            <div id="portal-dashboard" class="block page-enter max-w-7xl mx-auto">
                <header class="glass-card p-10 md:p-16 text-center border-t-[6px] border-blue-500 mb-12 relative overflow-hidden">
                    <div class="relative z-10">
                        <!-- الشعار الذي طلبته -->
                        <img src="tvtc.png" alt="TVTC Logo" class="h-28 md:h-36 mx-auto mb-8 object-contain drop-shadow-lg" onerror="this.style.display='none'">
                        
                        <span class="bg-white/60 text-blue-900 py-2.5 px-8 rounded-full text-sm font-black mb-6 inline-block shadow-sm border border-white/50 backdrop-blur-md">المؤسسة العامة للتدريب التقني والمهني</span>
                        <h1 id="home-main-title" class="text-5xl md:text-7xl font-black mb-6 text-slate-900 tracking-tight drop-shadow-md">شبكات <span class="text-blue-700">الحاسب الآلي</span></h1>
                        <p id="home-sub-title" class="text-lg md:text-2xl text-slate-800 max-w-4xl mx-auto font-bold leading-relaxed drop-shadow-sm">المرجع الأكاديمي الشامل لمهندسي الشبكات، يغطي المبادئ، الأمان، بروتوكولات التوجيه، والمعايير الفيزيائية.</p>
                    </div>
                </header>
                
                <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- سيتم تعبئة البطاقات هنا برمجياً -->
                </div>
            </div>

            <!-- حاوية الأقسام التعليمية (تعرض الـ PDF أو تعديلات الـ CMS) -->
            <div id="section-container" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="glass-card p-8 md:p-10 mb-8 text-center border-t-[6px] border-blue-500">
                    <h1 id="section-title" class="text-4xl md:text-5xl font-black text-blue-900 tracking-tight drop-shadow-sm">العنوان</h1>
                </header>

                <!-- للتبويبات العلوية في الجوال فقط -->
                <div id="mobile-tabs" class="lg:hidden flex gap-2 overflow-x-auto custom-scrollbar mb-8 pb-2"></div>
                
                <div id="content-area" class="w-full page-enter">
                    <!-- المحتوى سيحقن هنا -->
                </div>
            </div>

            <!-- قسم الاختبارات (LMS Views) -->
            <div id="section-exams" class="hidden page-enter max-w-6xl mx-auto pb-20">
                <header class="glass-card p-8 md:p-10 mb-8 text-center border-t-[6px] border-yellow-500">
                    <h1 class="text-4xl md:text-5xl font-black text-yellow-700 tracking-tight drop-shadow-sm">التقييمات وإدارة الموقع</h1>
                </header>
                <div id="lms-area"></div>
            </div>

        </main>
    </div>

    <div id="tst" class="toast"><i id="tsti" class="fas"></i><span id="tstt"></span></div>

    <!-- بيانات المحتوى الأساسية (بشفافية 50% وتنسيقات مرنة) -->
    <script>
        const CORE_DATA = {
            'networks': {
                title: 'مبادئ شبكات الحاسب', icon: 'fa-globe', color: 'blue', desc: 'مفهوم الشبكة، المكونات، الفوائد، والتصاميم الهندسية بالكامل.',
                tabs: ['مفهوم الشبكة والفوائد', 'المكونات والوسائط', 'التصاميم الجغرافية والمعمارية'],
                content: [
                    `<div class="rich-display glass-card">
                        <h1 style="color: #1e40af;">🌐 ماهي شبكة الحاسب؟</h1>
                        <p>شبكة الحاسب (Computer Network) عبارة عن مجموعة من الحاسبات والأجهزة الأخرى المتصلة مع بعضها البعض حيث يكون لها القدرة على مشاركة عدد كبير من المستخدمين للبيانات (Data) والأجهزة (Hardware) كما تعتبر الشبكة وسيلة اتصال الكتروني بين الأفراد.</p>
                        
                        <h2 style="text-align: center; margin-top: 2rem; color: #1e293b;">فوائد شبكات الحاسب</h2>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card border-t-4 border-t-blue-500 bg-white/40">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">💾</div>
                                <div class="custom-grid-title text-blue-900">مشاركة البيانات</div>
                                <p class="custom-grid-desc">نقل المعلومات والملفات بسرعة فائقة بين المستخدمين دون وسائط تخزين خارجية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-emerald-500 bg-white/40">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🖨️</div>
                                <div class="custom-grid-title text-emerald-900">مشاركة الموارد</div>
                                <p class="custom-grid-desc">تتيح للجميع استخدام أجهزة صلبة (Hardware) مثل الطابعات والماسحات الضوئية.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-purple-500 bg-white/40">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">💻</div>
                                <div class="custom-grid-title text-purple-900">مشاركة البرمجيات</div>
                                <p class="custom-grid-desc">العمل على برامج موحدة (Software) بتثبيت نسخة واحدة على الخادم للجميع.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-orange-500 bg-white/40 md:col-span-1 lg:col-span-1">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">📂</div>
                                <div class="custom-grid-title text-orange-900">مشاركة الملفات مباشرة</div>
                                <p class="custom-grid-desc">نقل مباشر بين الأجهزة بدلاً من إرسالها عبر البريد الإلكتروني.</p>
                            </div>
                            <div class="custom-grid-card border-t-4 border-t-red-500 bg-white/40 md:col-span-2 lg:col-span-2">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🎮</div>
                                <div class="custom-grid-title text-red-900">ألعاب الكمبيوتر الجماعية</div>
                                <p class="custom-grid-desc">التفاعل بين أكثر من مستخدم (Multiplayer) للعب في نفس البيئة الافتراضية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card">
                        <h1 style="text-align: center; color: #1e293b;">مكونات شبكة الحاسب</h1>
                        <div class="custom-grid-container">
                            <div class="custom-grid-card bg-white/40">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🖥️</div>
                                <div class="custom-grid-title text-blue-900">الأجهزة الطرفية</div>
                                <div class="text-blue-700 font-black mb-4 uppercase text-xs tracking-widest bg-white/50 py-1.5 rounded shadow-sm">End Devices</div>
                                <p class="custom-grid-desc text-justify">الجهاز الطرفي: هو المكان الذي تنشأ منه الرسالة أو المكان الذي يتم استلامها فيه. تنشأ البيانات باستخدام جهاز طرفي وتتدفق خلال الشبكة وتصل إلى جهاز طرفي آخر. (مثل أجهزة الكمبيوتر، الطابعات الشبكية، الكاميرات، الجوالات).</p>
                            </div>
                            <div class="custom-grid-card bg-white/40">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🔀</div>
                                <div class="custom-grid-title text-indigo-900">الأجهزة الوسيطة</div>
                                <div class="text-indigo-700 font-black mb-4 uppercase text-xs tracking-widest bg-white/50 py-1.5 rounded shadow-sm">Intermediary</div>
                                <p class="custom-grid-desc text-justify">تقوم بالاتصال البيني بين الأجهزة الطرفية وتوجيه الحزم واختيار المسار وحماية الشبكة. من الأمثلة عليها: أجهزة التبديل (Switch)، أجهزة التوجيه (Router)، نقاط الوصول اللاسلكية (Access Point)، وجدران الحماية (Firewalls).</p>
                            </div>
                            <div class="custom-grid-card bg-white/40">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">📡</div>
                                <div class="custom-grid-title text-emerald-900">وسائط الشبكة</div>
                                <div class="text-emerald-700 font-black mb-4 uppercase text-xs tracking-widest bg-white/50 py-1.5 rounded shadow-sm">Media</div>
                                <p class="custom-grid-desc text-justify">يتم نقل الاتصالات عبر الشبكة من خلال وسيط يسمح للرسالة بالانتقال من المصدر إلى الوجهة. وتشمل: الكابلات النحاسية، كابلات الألياف الضوئية، والموجات اللاسلكية.</p>
                            </div>
                        </div>
                    </div>`,
                    `<div class="rich-display glass-card">
                        <h2 style="color: #1e293b;">الشبكات من حيث المدى الجغرافي</h2>
                        <div class="custom-grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                            <div class="custom-grid-card bg-white/50">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">📱</div>
                                <div class="custom-grid-title text-blue-900">PAN</div>
                                <p class="custom-grid-desc">الشبكة الشخصية لتوصيل الأجهزة في نطاق أمتار كالبلوتوث.</p>
                            </div>
                            <div class="custom-grid-card bg-white/50">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🏢</div>
                                <div class="custom-grid-title text-emerald-900">LAN</div>
                                <p class="custom-grid-desc">الشبكة المحلية داخل منطقة جغرافية محدودة كالمباني والمكاتب.</p>
                            </div>
                            <div class="custom-grid-card bg-white/50">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🏙️</div>
                                <div class="custom-grid-title text-purple-900">MAN</div>
                                <p class="custom-grid-desc">الشبكة المتوسطة الإقليمية التي تربط LANs ضمن مدينة واحدة.</p>
                            </div>
                            <div class="custom-grid-card bg-white/50">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🌍</div>
                                <div class="custom-grid-title text-orange-900">WAN</div>
                                <p class="custom-grid-desc">الشبكة الواسعة للربط بين مدن ودول وتغطي مسافات شاسعة.</p>
                            </div>
                        </div>

                        <hr class="my-10 border-slate-300">

                        <div class="grid md:grid-cols-2 gap-10">
                            <div>
                                <h2 style="color: #1e293b;">المعمارية التقنية (Architecture)</h2>
                                <div class="bg-white/50 p-6 rounded-2xl border border-white/50 mb-5 flex items-center gap-4 shadow-sm">
                                    <div style="font-size: 2.5rem;">👥</div>
                                    <div>
                                        <h3 class="!text-lg !mb-1 text-indigo-900">نظير إلى نظير (P2P)</h3>
                                        <p class="!text-sm text-slate-800 !mb-0 font-bold leading-relaxed">بنية شبكية موزعة تتصل فيها الأجهزة مباشرة دون خادم مركزي، كل جهاز يسمى "نظير" ويعمل كعميل وخادم.</p>
                                    </div>
                                </div>
                                <div class="bg-white/50 p-6 rounded-2xl border border-white/50 flex items-center gap-4 shadow-sm">
                                    <div style="font-size: 2.5rem;">🗄️</div>
                                    <div>
                                        <h3 class="!text-lg !mb-1 text-blue-900">العميل والخادم (Client/Server)</h3>
                                        <p class="!text-sm text-slate-800 !mb-0 font-bold leading-relaxed">بنية تعتمد على وجود خادم مركزي يقدم خدمات وموارد، وعملاء يطلبون هذه الخدمات وتتم معالجتها بالخادم.</p>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h2 style="color: #1e293b;">التصميم الهندسي (Topologies)</h2>
                                <div class="grid grid-cols-2 gap-4 text-center">
                                    <div class="bg-white/50 p-5 rounded-2xl border border-white/50 shadow-sm hover-scale">
                                        <div style="font-size: 2rem; margin-bottom: 0.5rem;">➖</div>
                                        <span class="font-black text-emerald-900">الخطية (Bus)</span>
                                        <p class="text-xs text-slate-700 mt-1 font-bold">كابل رئيسي واحد.</p>

                content: [
                    `<div class="rich-display glass-card border-t-[6px] border-emerald-500">
                        <h1 style="color: #047857;">📚 مرجع OSI (Open Systems Interconnection)</h1>
                        <p>هو مراحل تكون البيانات ونقلها من الجهاز المرسل (Source device) إلى الجهاز المستقبل (Destination device). وضعته المنظمة الدولية للمعايير (ISO) سنة 1983 برقم 7498 ليكون نموذج نظري موثوق للاتصالات مقسم لـ 7 طبقات.</p>
                        
                        <h2 style="color: #1e293b;">فائدة فهم طبقات OSI:</h2>
                        <ul>
                            <li>تستطيع فهم وحل المشاكل (Troubleshooting) للشبكات.</li>
                            <li>معرفة كيفية تكوين البيانات وما هو شكلها في كل مرحلة.</li>
                            <li>تفيد بمعرفة النقاط الحساسة وكيفية تشفير وفك البيانات.</li>
                            <li>معرفة كل جهاز في أية طبقة يعمل (مثل HUB والراوتر والسويتش).</li>
                        </ul>

                        <h2 style="text-align: center; margin-top: 2rem; border-top: 1px solid #cbd5e1; padding-top: 2rem; color: #1e293b;">الطبقات السبع (OSI Layers)</h2>
                        <div class="space-y-4 font-sans mt-6">

                            <div class="bg-white/70 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-orange-500 hover:bg-white transition"><span class="text-4xl font-black text-orange-400 w-12 text-center">6</span><div><h4 class="text-xl font-black text-slate-900">Presentation (طبقة التقديم)</h4><p class="font-bold text-sm text-slate-800 mt-1">تهيئة البيانات وتحديد امتدادها (نصوص، صور)، وعمل التشفير وفك التشفير والضغط. بروتوكولات: JPEG, HTML.</p></div></div>
                            <div class="bg-white/70 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-yellow-500 hover:bg-white transition"><span class="text-4xl font-black text-yellow-500 w-12 text-center">5</span><div><h4 class="text-xl font-black text-slate-900">Session (طبقة الجلسة)</h4><p class="font-bold text-sm text-slate-800 mt-1">إدارة وفتح وإغلاق الاتصال وتحديد نوعه إرسال واستقبال (Simplex, Half Duplex, Full Duplex). بروتوكولات: NFS, SQL.</p></div></div>
                            <div class="bg-white/70 border border-slate-200 p-5 rounded-2xl flex items-center gap-6 shadow-sm border-r-8 border-r-emerald-500 hover:bg-white transition"><span class="text-4xl font-black text-emerald-500 w-12 text-center">4</span><div><h4 class="text-xl font-black text-slate-900">Transport (طبقة النقل)</h4><p class="font-bold text-sm text-slate-800 mt-1">تحديد البروتوكول المناسب لنقل البيانات وتقطيعها (Segment) وضمانها. بروتوكولات: TCP (للملفات), UDP (للصوت والفيديو).</p></div></div>

                        </div>
                    </div>`,
                    `<div class="rich-display glass-card border-t-[6px] border-emerald-500">

                    `<div class="rich-display glass-card border-t-[6px] border-purple-500">

                        <p>الكابل هو الوسيط الذي تنتقل من خلاله البيانات والمعلومات من حاسب إلى آخر في الشبكة أو من شبكة إلى شبكة أخرى.</p>
                        
                        <h2 style="text-align: center; margin-top: 2.5rem; color: #1e293b;">أنواع كبلات الشبكات الأساسية</h2>

                        <h2 style="margin-top: 2.5rem; color: #7e22ce;">فئات كابل المزدوج المجدول (UTP Categories)</h2>

            if(!tabName || !htmlContent || htmlContent.trim() === '') return toast("أدخل العنوان والمحتوى", "error");

            const payload = { sectionId, tabName, htmlContent, order, timestamp: new Date().toISOString() };

            try {
                if(docId && docId.startsWith('core_')) {
                    await setDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس الأساسي بنجاح!");
                } else if(docId) { 
                    await updateDoc(doc(db, PATH, 'articles', docId), payload); toast("تم تعديل الدرس بنجاح!");

        window.updTy = s => {
            const b = s.closest('.q-form-block'), t = s.value, oc = b.querySelector('.q-opts'), c = b.querySelector('.q-c');
            if(t==='short-answer'){ oc.style.display='none'; c.placeholder="اكتب النص الصحيح"; }
            else if(t==='true-false'){ oc.style.display='grid'; b.querySelector('.o1').value="صح"; b.querySelector('.o2').value="خطأ"; b.querySelector('.o3').style.display=b.querySelector('.o4').style.display='none'; c.placeholder="1 لصح، 2 لخطأ"; }
            else { oc.style.display='grid'; b.querySelector('.o3').style.display=b.querySelector('.o4').style.display='block'; c.placeholder=t==='multiple-answers'?"أرقام مفصولة (1,3)":"رقم الإجابة"; }
        };

        window.saveQuiz = async () => {
            const title = document.getElementById('quiz-t').value.trim(); if(!title) return toast("أدخل عنوان الاختبار", "error");
            let qs = [], ok = true; document.querySelectorAll('.q-form-block').forEach(b => { 
                const ty = b.querySelector('.q-ty').value, tx = b.querySelector('.q-t').innerHTML.trim(), crRaw = b.querySelector('.q-c').value.trim();
                if(!tx || !crRaw) { ok = false; return; }
                let opts = [], cr = crRaw;
                if(ty !== 'short-answer') { opts = [b.querySelector('.o1').value, b.querySelector('.o2').value, b.querySelector('.o3').value, b.querySelector('.o4').value].filter(x=>x); if(ty==='true-false') opts.length=2; }
                if(ty === 'multiple-answers') cr = crRaw.split(',').map(n=>parseInt(n.trim())-1); else if(ty!=='short-answer') cr = parseInt(crRaw)-1;
                qs.push({ type: ty, text: tx, options: opts, correctAnswer: cr }); 
            });
            if(!qs.length || !ok) return toast("تأكد من تعبئة جميع الحقول", "error");
            try { await addDoc(collection(db, PATH, 'quizzes'), { title, questions: qs, createdAt: new Date().toISOString() }); toast("تم الحفظ سحابياً بنجاح"); renderDash(); } catch(e){toast("خطأ","error");}
        };

        window.renderStudentPortal = async () => {
            document.getElementById('lms-area').innerHTML = `
            <div class="max-w-4xl mx-auto">
                <div class="glass-card p-10 flex flex-col md:flex-row items-center gap-6 mb-12 shadow-lg border-t-[8px] border-blue-600 bg-white/95">
                    <div class="w-24 h-24 bg-blue-100 text-blue-700 rounded-[2rem] flex items-center justify-center text-4xl shadow-inner shrink-0"><i class="fas fa-user-edit"></i></div>
                    <div class="flex-grow w-full space-y-4">
                        <input type="text" id="student-n" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-4 text-xl font-black text-slate-800 focus:border-blue-500 outline-none placeholder:text-slate-400 shadow-inner" placeholder="الاسم الثلاثي..">
                        <input type="text" id="student-id" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-4 text-xl font-black text-slate-800 focus:border-blue-500 outline-none placeholder:text-slate-400 shadow-inner" placeholder="الرقم التدريبي..">
                    </div>
                </div>
                <h3 class="text-3xl font-black mb-8 text-slate-800 border-b-2 border-slate-300 pb-4">الاختبارات التقييمية المتاحة:</h3>
                <div id="quizzes-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 text-center text-slate-600 font-bold"><div class="col-span-full py-10"><i class="fas fa-spinner fa-spin text-5xl mb-4 text-blue-600"></i><br>جاري جلب الاختبارات..</div></div>
            </div>`;
            try {
                const s = await getDocs(collection(db, PATH, 'quizzes')); quizzesCache = []; s.forEach(d => quizzesCache.push({id:d.id, ...d.data()}));
                const qg = document.getElementById('quizzes-grid');
                if(!quizzesCache.length) qg.innerHTML = '<p class="col-span-full bg-white/80 p-10 rounded-[2rem] border border-slate-300 text-lg shadow-sm">لا توجد اختبارات متاحة حالياً.</p>';
                else qg.innerHTML = quizzesCache.map(q => `
                    <div onclick="startQuiz('${q.id}')" class="glass-card p-8 border-t-[8px] border-blue-500 cursor-pointer hover-scale text-center flex flex-col items-center bg-white/95">
                        <h4 class="font-black text-2xl mb-4 text-blue-900">${q.title}</h4>
                        <p class="text-sm font-bold text-slate-700 bg-blue-50 px-4 py-2 rounded-xl border border-blue-200 mt-auto w-full"><i class="fas fa-list-ol text-blue-600 ml-1"></i> ${q.questions.length} أسئلة تقييمية</p>
                    </div>`).join('');
            } catch(e) { document.getElementById('quizzes-grid').innerHTML = '<p class="col-span-full text-red-600 text-lg font-bold">خطأ في جلب الاختبارات.</p>'; }
        };

        window.startQuiz = id => {
            const n = document.getElementById('student-n').value.trim(); 
            const sId = document.getElementById('student-id').value.trim();
            if(!n || !sId) return toast("يرجى كتابة الاسم والرقم التدريبي أولاً", "error");
            window.currentStudent = { name: n, id: sId };

            const q = quizzesCache.find(x => x.id === id); activeQuiz = q;
            document.getElementById('lms-area').innerHTML = `<div class="glass-card max-w-4xl mx-auto p-10 md:p-16 border-t-[15px] border-blue-600 shadow-2xl bg-white/95"><div class="flex justify-between items-center mb-12 border-b-2 border-slate-200 pb-6"><h2 class="text-3xl md:text-4xl font-black text-blue-900">${q.title}</h2><button onclick="renderStudentPortal()" class="text-red-600 bg-red-50 hover:bg-red-600 hover:text-white p-3 rounded-xl transition shadow-sm border border-red-200"><i class="fas fa-times text-xl"></i></button></div><div id="q-render-area" class="space-y-12"></div><button onclick="processSubmit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-2xl font-black text-2xl shadow-xl mt-12 transition">تسليم الإجابات <i class="fas fa-paper-plane ml-2"></i></button></div>`;
            
            document.getElementById('q-render-area').innerHTML = q.questions.map((qu, i) => {
                let optsHtml = '';
                if(qu.type === 'short-answer') optsHtml = `<input type="text" class="w-full p-5 bg-white border border-slate-300 rounded-xl text-slate-900 font-black focus:border-blue-600 outline-none tin text-lg shadow-inner" placeholder="اكتب إجابتك هنا..">`;
                else if(qu.type === 'multiple-answers') optsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${qu.options.map((o, j) => `<label class="p-5 border border-slate-200 bg-slate-50 rounded-2xl flex items-center gap-4 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition shadow-sm"><input type="checkbox" class="w-6 h-6 rounded border-slate-400 text-blue-600 focus:ring-blue-500" value="${j}"> <span class="font-bold text-lg text-slate-800">${o}</span></label>`).join('')}</div>`;
                else optsHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${qu.options.map((o, j) => `<div onclick="selectOpt(this)" class="p-5 border border-slate-200 bg-slate-50 rounded-2xl cursor-pointer opt-box hover:border-blue-400 hover:bg-blue-50 font-bold text-lg text-slate-800 transition shadow-sm" data-v="${j}">${o}</div>`).join('')}</div>`;
                
                return `<div class="p-8 md:p-10 bg-white border border-slate-300 rounded-[3rem] q-entry shadow-sm" data-i="${i}" data-ty="${qu.type}" data-cr="${typeof qu.correctAnswer==='object'?qu.correctAnswer.join(','):qu.correctAnswer}">
                    <div class="text-xl md:text-2xl font-black mb-8 leading-relaxed text-slate-900 rich-display p-0 border-none bg-transparent min-h-0 h-auto inline shadow-none">${i+1}. ${qu.text}</div> ${qu.type==='multiple-answers'?'<span class="text-xs bg-blue-100 text-blue-800 px-3 py-1.5 rounded-lg ml-2 font-black align-top shadow-sm border border-blue-200">(اختيار متعدد)</span>':''}
                    <div class="mt-6">${optsHtml}</div>
                </div>`;
            }).join('');
            window.smoothScrollTop();
        };

        window.selectOpt = el => { el.parentElement.querySelectorAll('.opt-box').forEach(x => x.classList.remove('bg-blue-600', 'border-blue-600', 'text-white', 'active-opt')); el.classList.add('bg-blue-600', 'border-blue-600', 'text-white', 'active-opt'); el.classList.remove('text-slate-800', 'bg-slate-50'); };

        window.processSubmit = async () => {
            let score = 0, unanswered = [];
            document.querySelectorAll('.q-entry').forEach((e, index) => { 
                const ty = e.dataset.ty, cr = e.dataset.cr;
                let answered = false;
                if(ty === 'short-answer') { 
                    const v = e.querySelector('.tin').value.trim(); 
                    if(v) { answered = true; if(v.toLowerCase()===cr.toLowerCase()) score++; } 
                }
                else if(ty === 'multiple-answers') { 
                    const chks = Array.from(e.querySelectorAll('input:checked')).map(c=>c.value); 
                    if(chks.length > 0) { answered = true; const cra = cr.split(','); if(chks.length===cra.length && chks.every(v=>cra.includes(v))) score++; } 
                }
                else { 
                    const s = e.querySelector('.active-opt'); 
                    if(s) { answered = true; if(s.dataset.v===cr) score++; } 
                }
                if(!answered) unanswered.push(index + 1);
            });

            if(unanswered.length > 0) return toast("الرجاء الإجابة على السؤال رقم: " + unanswered.join(' و '), "error");

            try {
                await addDoc(collection(db, PATH, 'results'), { 
                    studentName: window.currentStudent.name || "غير مدون", 
                    studentId: window.currentStudent.id || "غير مدون",
                    quizTitle: window.activeQuiz.title || "اختبار", 
                    score: score || 0, 
                    total: window.activeQuiz.questions.length || 0, 
                    timestamp: new Date().toISOString() 
                });
                
                document.getElementById('lms-area').innerHTML = `
                <div class="glass-card max-w-lg mx-auto text-center p-16 border-t-[16px] ${score===activeQuiz.questions.length?'border-yellow-500':'border-emerald-500'} shadow-2xl bg-white/95">
                    <i class="fas ${score===activeQuiz.questions.length?'fa-trophy text-yellow-500':'fa-star text-emerald-500'} text-9xl mb-8 drop-shadow-lg"></i>
                    <h2 class="text-4xl font-black mb-4 text-slate-800">النتيجة النهائية</h2>
                    <p class="font-bold text-slate-600 text-xl mb-8">أحسنت يا ${window.currentStudent.name}</p>
                    <div class="text-[100px] font-black text-blue-700 mb-10 bg-blue-50 py-6 rounded-[3rem] border border-blue-200 shadow-inner">${score}<span class="text-5xl text-slate-400 mx-3">/</span><span class="text-6xl text-slate-600">${activeQuiz.questions.length}</span></div>
                    <button onclick="renderStudentPortal()" class="bg-slate-800 text-white w-full py-5 rounded-2xl font-black text-2xl transition hover:bg-slate-700 shadow-xl">العودة لقائمة الاختبارات</button>
                </div>`;
                window.smoothScrollTop();
            } catch(e) { console.error(e); toast("حدث خطأ تقني أثناء حفظ النتيجة، تأكد من الاتصال.", "error"); }
        };

        window.loadRes = async () => {
            const list = document.getElementById('res-list'); list.innerHTML = '<p class="text-center font-bold text-slate-500 text-base"><i class="fas fa-spinner fa-spin text-3xl mb-2"></i><br>جاري التحديث..</p>';
            try {
                const s = await getDocs(collection(db, PATH, 'results')); window.loadedResults = []; s.forEach(d => window.loadedResults.push(d.data()));
                window.loadedResults.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                if(!window.loadedResults.length) return list.innerHTML = '<p class="text-center text-slate-600 font-bold text-base bg-slate-50 p-6 rounded-2xl border border-slate-300 shadow-sm">لا توجد نتائج مسجلة حتى الآن.</p>';
                list.innerHTML = `<table class="w-full text-right"><tr class="border-b border-slate-300 text-sm font-black text-slate-700 bg-slate-100"><th class="p-4 rounded-tr-xl">اسم المتدرب (والرقم)</th><th class="p-4">الاختبار</th><th class="p-4 rounded-tl-xl">الدرجة</th></tr>` + 
                    window.loadedResults.map(r => `<tr class="border-b border-slate-200 hover:bg-slate-50 transition"><td class="py-4 px-4 font-black text-base text-slate-900">${r.studentName} <br><span class="text-xs text-slate-500">${r.studentId||''}</span></td><td class="py-4 px-4 text-slate-700 font-bold text-sm">${r.quizTitle}</td><td class="py-4 px-4 font-mono text-blue-700 text-lg font-black"><span class="bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200">${r.score}/${r.total}</span></td></tr>`).join('') + `</table>`;
            } catch(e) { list.innerHTML = '<p class="text-red-600 font-bold text-center text-base">خطأ في الجلب.</p>'; }
        };

        window.exportToExcel = () => {
            if(!window.loadedResults || window.loadedResults.length === 0) return toast("لا توجد نتائج للتحميل", "error");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "الاسم,الرقم التدريبي,الاختبار,الدرجة,الدرجة الكلية,التاريخ\n";
            window.loadedResults.forEach(r => {
                let date = new Date(r.timestamp).toLocaleDateString('ar-SA');
                let name = (r.studentName || '').replace(/,/g, ''); 
                let id = (r.studentId || '').replace(/,/g, '');
                let quiz = (r.quizTitle || '').replace(/,/g, '');
                csvContent += `${name},${id},${quiz},${r.score},${r.total},${date}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "نتائج_المتدربين.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.impJ = e => { const r = new FileReader(); r.onload = ev => { try { JSON.parse(ev.target.result).forEach(q => { window.addQForm(); const l = document.getElementById('quiz-c').lastChild; l.querySelector('.q-ty').value=q.type||'multiple-choice'; window.updTy(l.querySelector('.q-ty')); l.querySelector('.q-t').innerHTML = q.text; if(q.options) { l.querySelector('.o1').value = q.options[0]||''; l.querySelector('.o2').value = q.options[1]||''; l.querySelector('.o3').value = q.options[2]||''; l.querySelector('.o4').value = q.options[3]||''; } let cc = q.correctAnswer; if(typeof cc==='object') cc=cc.map(n=>n+1).join(','); else if(q.type!=='short-answer') cc++; l.querySelector('.q-c').value = cc; }); toast("تم الاستيراد بنجاح"); } catch(e){toast("خطأ في ملف JSON","error");} }; r.readAsText(e.target.files[0]); };
    </script>
</body>
</html>
