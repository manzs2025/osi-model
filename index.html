<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية الشبكات الشاملة | الإصدار الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { primary: '#020617', secondary: '#3b82f6', accent: '#0ea5e9' }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .tech-bg { background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 30px 30px; }
            .glass-card { @apply bg-white/90 backdrop-blur-md border border-white/60 shadow-xl; }
            .hover-scale { @apply transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl; }
            .header-gradient { background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e3a8a 100%); border-bottom: 4px solid #3b82f6; }
            .nav-tab { @apply px-5 py-2 transition-all border-b-2 border-transparent cursor-pointer whitespace-nowrap hover:bg-white/10; }
            .nav-tab.active { @apply text-blue-400 border-blue-500 font-black bg-blue-500/10; }
            .osi-card { @apply transition-all duration-300 border-r-[12px] relative overflow-hidden hover:scale-[1.01] hover:-translate-x-2; }
        }
        .page-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast { @apply fixed bottom-5 right-5 z-[9999] opacity-0 translate-y-10 transition-all duration-300 glass-card px-6 py-4 rounded-2xl border-l-4 font-bold; }
        .toast.show { @apply opacity-100 translate-y-0; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 font-sans flex flex-col min-h-screen tech-bg custom-scroll">

    <!-- شريط التنقل العلوي -->
    <nav class="bg-primary/95 backdrop-blur text-white p-3 sticky top-0 z-50 border-b border-blue-500/30">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-black flex items-center gap-3 cursor-pointer" onclick="goHome()">
                <div class="bg-gradient-to-br from-blue-600 to-cyan-500 p-2 rounded-xl shadow-lg"><i class="fas fa-network-wired"></i></div>
                <span class="tracking-tighter hidden md:inline">أكاديمية الشبكات</span>
            </div>
            <div class="flex items-center gap-4">
                <div id="dynamic-tabs" class="hidden md:flex gap-1 overflow-x-auto text-sm font-bold"></div>
                <div class="flex gap-2 border-r border-white/20 pr-4">
                    <button onclick="goHome()" class="bg-white/10 w-10 h-10 rounded-xl hover:bg-blue-600 transition flex items-center justify-center"><i class="fas fa-home"></i></button>
                    <button onclick="toggleFS()" class="bg-white/5 w-10 h-10 rounded-xl hover:bg-white/20 transition text-slate-300"><i class="fas fa-expand" id="fs-icon"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <!-- الواجهة الرئيسية -->
        <div id="portal-dashboard" class="block page-fade">
            <header class="header-gradient py-28 text-center text-white relative">
                <div class="container mx-auto px-6 relative z-10">
                    <span class="bg-blue-900/50 text-blue-300 py-1.5 px-6 rounded-full text-xs font-black mb-8 inline-block border border-blue-500/50 uppercase">المؤسسة العامة للتدريب التقني والمهني</span>
                    <h1 class="text-5xl md:text-7xl font-black mb-8 tracking-tighter">أكاديمية <span class="text-blue-400">الشبكات</span> الشاملة</h1>
                    <p class="text-xl md:text-2xl text-slate-300 max-w-3xl mx-auto leading-relaxed">بوابتك التفاعلية المتقدمة لتعلم هندسة الشبكات والأمن السيبراني.</p>
                </div>
            </header>
            
            <div class="container mx-auto px-6 -mt-16 pb-20 relative z-20">
                <div id="main-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
                    <!-- يتم توليد البطاقات ديناميكياً من JS -->
                </div>
            </div>
        </div>

        <!-- حاوية الأقسام الديناميكية -->
        <div id="section-container" class="hidden pb-20">
            <header class="header-gradient py-12 text-center text-white"><h1 id="section-title" class="text-4xl font-black">العنوان</h1></header>
            <div id="content-area" class="container mx-auto px-6 mt-10 page-fade">
                <!-- يتم حقن المحتوى التعليمي هنا -->
            </div>
        </div>

        <!-- قسم المركز التفاعلي LMS (ثابت) -->
        <div id="section-exams" class="main-section hidden pb-20">
            <header class="header-gradient py-16 text-center text-white"><h1 class="text-5xl font-black">المركز التفاعلي LMS</h1></header>
            <div id="lms-content" class="container mx-auto px-6 mt-10">
                <!-- محتوى الـ LMS سيحقن هنا -->
            </div>
        </div>
    </main>

    <footer class="bg-primary text-slate-500 py-16 text-center border-t border-blue-500/20 mt-auto">
        <div class="container mx-auto px-6">
            <p class="font-black text-white text-2xl mb-2">أكاديمية الشبكات الشاملة &copy; 2024</p>
            <p class="text-xs font-bold opacity-60 uppercase tracking-widest font-mono">Innovative E-Learning Platform</p>
        </div>
    </footer>

    <div id="tst" class="toast"></div>

    <!-- برمجة النظام الديناميكي -->
    <script>
        // مصفوفة البيانات الضخمة (هنا تكمن القوة: فصل المحتوى عن التصميم)
        const SECTIONS = {
            'networks': {
                title: 'مبادئ الشبكات',
                icon: 'fa-globe',
                color: 'blue',
                tabs: ['المفهوم', 'المكونات', 'الأنواع'],
                content: [
                    `<div class="max-w-4xl mx-auto"><div class="glass-card p-10 rounded-[3rem] border-l-[12px] border-blue-500 mb-8"><h2 class="text-3xl font-black text-blue-900 mb-4">ما هي الشبكة؟</h2><p class="text-xl font-bold leading-relaxed text-slate-700">مجموعة من الحاسبات والأجهزة المتصلة لمشاركة البيانات والموارد، وتعتبر وسيلة اتصال سريعة وفعالة.</p></div><div class="grid md:grid-cols-3 gap-6 text-center text-lg font-black"><div class="glass-card p-8 rounded-3xl border-t-4 border-blue-500"><i class="fas fa-database text-blue-500 mb-3 text-4xl"></i><br>مشاركة البيانات</div><div class="glass-card p-8 rounded-3xl border-t-4 border-emerald-500"><i class="fas fa-print text-emerald-500 mb-3 text-4xl"></i><br>مشاركة الموارد</div><div class="glass-card p-8 rounded-3xl border-t-4 border-purple-500"><i class="fas fa-laptop-code text-purple-500 mb-3 text-4xl"></i><br>مشاركة البرامج</div></div></div>`,
                    `<div class="grid lg:grid-cols-3 gap-8 max-w-6xl mx-auto"><div class="glass-card p-0 rounded-[2.5rem] overflow-hidden flex flex-col hover-scale"><div class="bg-blue-600 p-8 text-white text-center"><i class="fas fa-desktop text-5xl"></i><h3 class="text-xl font-black mt-2">الأجهزة الطرفية</h3></div><p class="p-8 font-bold">مكان نشأة الرسالة (كمبيوتر، طابعة، هاتف ذكي).</p></div><div class="glass-card p-0 rounded-[2.5rem] overflow-hidden flex flex-col hover-scale"><div class="bg-indigo-600 p-8 text-white text-center"><i class="fas fa-random text-5xl"></i><h3 class="text-xl font-black mt-2">الأجهزة الوسيطة</h3></div><p class="p-8 font-bold">توجيه البيانات وحماية الشبكة (Switch, Router).</p></div><div class="glass-card p-0 rounded-[2.5rem] overflow-hidden flex flex-col hover-scale"><div class="bg-emerald-600 p-8 text-white text-center"><i class="fas fa-wifi text-5xl"></i><h3 class="text-xl font-black mt-2">وسائط الشبكة</h3></div><p class="p-8 font-bold">القنوات الناقلة (نحاس، ألياف، لاسلكي).</p></div></div>`,
                    `<div class="max-w-6xl mx-auto space-y-10"><div class="glass-card p-10 rounded-[3rem]"><h3 class="text-2xl font-black border-b-4 border-blue-500 pb-2 mb-8 inline-block">المدى الجغرافي</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center font-black"><div class="p-4 bg-slate-50 border rounded-2xl"><img src="img652.jpg" class="h-16 mx-auto mb-2 mix-blend-multiply" onerror="this.outerHTML='<i class=\'fab fa-bluetooth text-blue-500 text-3xl\'></i>'">PAN</div><div class="p-4 bg-slate-50 border rounded-2xl"><img src="img596.jpg" class="h-16 mx-auto mb-2 mix-blend-multiply" onerror="this.outerHTML='<i class=\'fas fa-building text-blue-500 text-3xl\'></i>'">LAN</div><div class="p-4 bg-slate-50 border rounded-2xl"><img src="img679.jpg" class="h-16 mx-auto mb-2 mix-blend-multiply" onerror="this.outerHTML='<i class=\'fas fa-city text-blue-500 text-3xl\'></i>'">MAN</div><div class="p-4 bg-slate-50 border rounded-2xl"><img src="img706.jpg" class="h-16 mx-auto mb-2 mix-blend-multiply" onerror="this.outerHTML='<i class=\'fas fa-globe text-blue-500 text-3xl\'></i>'">WAN</div></div></div></div>`
                ]
            },
            'security': {
                title: 'الأمان في الشبكات',
                icon: 'fa-shield-alt',
                color: 'red',
                tabs: ['المفهوم', 'التهديدات', 'الحلول'],
                content: [
                    `<div class="max-w-4xl mx-auto"><div class="glass-card p-12 border-l-[12px] border-red-600 rounded-[3rem]"><h2 class="text-3xl font-black text-red-900 mb-4">أمن المعلومات</h2><p class="text-xl font-bold leading-loose">حماية الأصول الرقمية من الاختراق، التخريب، أو الدخول غير المصرح به.</p></div></div>`,
                    `<div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto"><div class="glass-card p-8 border-t-8 border-orange-500"><h4 class="font-black text-xl mb-4">تهديدات داخلية</h4><p class="font-bold text-slate-600">موظفون، إهمال، أو تسريب بيانات.</p></div><div class="glass-card p-8 border-t-8 border-red-600"><h4 class="font-black text-xl mb-4">تهديدات خارجية</h4><p class="font-bold text-slate-600">قراصنة، فيروسات، وهجمات DDoS.</p></div></div>`,
                    `<div class="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto text-white font-black"><div class="glass-card p-6 bg-slate-800 border-t-4 border-rose-500">جدران نارية</div><div class="glass-card p-6 bg-slate-800 border-t-4 border-blue-500">أنظمة IDS/IPS</div><div class="glass-card p-6 bg-slate-800 border-t-4 border-purple-500">التشفير المتقدم</div></div>`
                ]
            },
            'osi': {
                title: 'نموذج OSI المرجعي',
                icon: 'fa-layer-group',
                color: 'emerald',
                tabs: ['الطبقات السبع', 'المقارنات'],
                content: [
                    `<div class="max-w-3xl mx-auto space-y-3 font-black">${[7,6,5,4,3,2,1].map(n=>`<div class="osi-card bg-layer${n} text-white p-5 rounded-2xl flex gap-6 items-center shadow-lg border-primary/20"><span class="text-5xl opacity-30">${n}</span><div>الطبقة رقم ${n}</div></div>`).join('')}</div>`,
                    `<div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto"><div class="glass-card p-8 border-t-8 border-blue-500"><h4 class="font-black mb-4">TCP vs UDP</h4><p class="font-bold">TCP: موثوق وبطيء.<br>UDP: سريع وغير موثوق.</p></div><div class="glass-card p-8 border-t-8 border-emerald-500"><h4 class="font-black mb-4">Switch vs Router</h4><p class="font-bold">Switch: طبقة 2 (MAC).<br>Router: طبقة 3 (IP).</p></div></div>`
                ]
            },
            'cables': {
                title: 'الكيابل والأدوات',
                icon: 'fa-ethernet',
                color: 'purple',
                tabs: ['الأنواع', 'الأدوات'],
                content: [
                    `<div class="grid md:grid-cols-3 gap-6 text-center max-w-5xl mx-auto"><div class="glass-card p-8">Coaxial (المحوري)</div><div class="glass-card p-8 border-t-8 border-purple-500">UTP (المجدول)</div><div class="glass-card p-8 border-t-8 border-blue-500">Fiber (الألياف)</div></div>`,
                    `<div class="max-w-4xl mx-auto space-y-4"><div class="glass-card p-8 border-r-[12px] border-blue-500 font-black">Crimping Tool (أداة الكبس)</div><div class="glass-card p-8 border-r-[12px] border-emerald-500 font-black">Cable Tester (جهاز الفحص)</div></div>`
                ]
            },
            'ip': {
                title: 'بروتوكول الإنترنت IP',
                icon: 'fa-map-location-dot',
                color: 'orange',
                tabs: ['الفئات', 'تمارين Subnet'],
                content: [
                    `<div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto text-white text-center font-black"><div class="card-box bg-slate-900 border-rose-500">Class A<br>255.0.0.0</div><div class="card-box bg-slate-900 border-blue-500">Class B<br>255.255.0.0</div><div class="card-box bg-slate-900 border-emerald-500">Class C<br>255.255.255.0</div></div>`,
                    `<div class="max-w-4xl mx-auto"><div class="bg-orange-100 p-8 rounded-[3rem] border-2 border-orange-200 text-center mb-8 font-black">القاعدة: 255 ثابت للشبكة، 0 متغير للجهاز.</div><div class="glass-card p-10 bg-slate-900 text-white font-mono text-xl text-center select-all">IPv6: 2001:0db8:85a3::8a2e:0370:7334</div></div>`
                ]
            }
        };

        let currentSectionKey = '';

        function initMainCards() {
            const container = document.getElementById('main-cards');
            container.innerHTML = Object.keys(SECTIONS).map(key => {
                const s = SECTIONS[key];
                return `<div onclick="openSection('${key}')" class="card-box border-b-8 border-${s.color}-500 group cursor-pointer">
                    <div class="w-16 h-16 bg-${s.color}-100 text-${s.color}-600 rounded-2xl flex items-center justify-center text-3xl mb-4 group-hover:-rotate-6 transition"><i class="fas ${s.icon}"></i></div>
                    <h2 class="text-2xl font-black mb-2">${s.title}</h2><p class="text-slate-600 text-sm font-bold">تصفح المحتوى التعليمي الكامل.</p>
                </div>`;
            }).join('') + `<div onclick="openSection('exams')" class="card-box border-b-8 border-yellow-500 group bg-slate-900 text-white cursor-pointer"><div class="w-16 h-16 bg-yellow-500/20 text-yellow-400 rounded-2xl flex items-center justify-center text-3xl mb-4 group-hover:-rotate-6 transition"><i class="fas fa-vial"></i></div><h2 class="text-2xl font-black mb-2">المركز التفاعلي</h2><p class="text-slate-400 text-sm font-bold">نظام LMS لإدارة الاختبارات.</p></div>`;
        }

        function goHome() {
            document.getElementById('portal-dashboard').classList.remove('hidden');
            document.getElementById('section-container').classList.add('hidden');
            document.getElementById('section-exams').classList.add('hidden');
            document.getElementById('dynamic-tabs').classList.add('hidden');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function openSection(key) {
            if(key === 'exams') return showLMSGateway();
            
            currentSectionKey = key;
            const s = SECTIONS[key];
            document.getElementById('portal-dashboard').classList.add('hidden');
            document.getElementById('section-exams').classList.add('hidden');
            document.getElementById('section-container').classList.remove('hidden');
            document.getElementById('section-title').innerText = s.title;
            
            const tabs = document.getElementById('dynamic-tabs');
            tabs.innerHTML = s.tabs.map((t, i) => `<div onclick="loadTabContent(${i}, this)" class="nav-tab ${i===0?'active':''}">${t}</div>`).join('');
            tabs.classList.remove('hidden');
            
            loadTabContent(0, tabs.querySelector('.nav-tab'));
        }

        function loadTabContent(index, el) {
            const area = document.getElementById('content-area');
            area.innerHTML = SECTIONS[currentSectionKey].content[index];
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fs-icon').className = 'fas fa-compress';
            } else {
                document.exitFullscreen();
                document.getElementById('fs-icon').className = 'fas fa-expand';
            }
        }

        function toast(m, t='success') {
            const e = document.getElementById('tst');
            e.innerText = m;
            e.className = `toast show ${t==='success'?'border-emerald-500 text-emerald-700':'border-red-500 text-red-700'}`;
            setTimeout(() => e.classList.remove('show'), 3000);
        }

        window.onload = () => { initMainCards(); goHome(); };
    </script>

    <!-- محرك الـ LMS المنفصل (يتم حقنه في #lms-content) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const fbCfg = { apiKey: "AIzaSyCz9Wedr_X3VzoaH0gJj8QFrNIK5vT4vww", authDomain: "networkacademy-795c8.firebaseapp.com", projectId: "networkacademy-795c8", storageBucket: "networkacademy-795c8.firebasestorage.app", messagingSenderId: "458132238000", appId: "1:458132238000:web:bffd7321407b094bb21575" };
        const app = initializeApp(fbCfg); const db = getFirestore(app); const auth = getAuth(app);
        const DP = `artifacts/networkacademy-795c8/public/data`;
        
        let qCache = [], curQ = null;
        signInAnonymously(auth).catch(() => toast("خطأ في الاتصال بالسحابة", "error"));

        window.showLMSGateway = () => {
            document.getElementById('portal-dashboard').classList.add('hidden');
            document.getElementById('section-container').classList.add('hidden');
            document.getElementById('section-exams').classList.remove('hidden');
            renderLMSGate();
        };

        function renderLMSGate() {
            document.getElementById('lms-content').innerHTML = `<div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto"><div onclick="renderStudentPortal()" class="card-box text-center cursor-pointer"><i class="fas fa-user-graduate text-6xl text-blue-500 mb-4"></i><h3 class="text-2xl font-black">دخول المتدرب</h3></div><div onclick="renderAdminLogin()" class="card-box text-center cursor-pointer"><i class="fas fa-user-shield text-6xl text-emerald-500 mb-4"></i><h3 class="text-2xl font-black">لوحة الإدارة</h3></div></div>`;
        }

        window.renderAdminLogin = () => {
            document.getElementById('lms-content').innerHTML = `<div class="max-w-md mx-auto card-box text-center"><h3>الرمز السري</h3><input type="password" id="p" class="w-full p-4 rounded-xl border my-4 text-center" placeholder="1234"><button onclick="vAdm()" class="btn-primary">دخول</button></div>`;
        };

        window.vAdm = () => {
            if(document.getElementById('p').value === '1234') renderAdminDash();
            else toast("خطأ", "error");
        };

        function renderAdminDash() {
            document.getElementById('lms-content').innerHTML = `<div class="grid lg:grid-cols-2 gap-8 max-w-7xl mx-auto"><div class="card-box"><h3>إنشاء اختبار</h3><input type="text" id="qt" class="w-full p-3 border rounded mb-4" placeholder="العنوان"><div id="qc" class="space-y-3 mb-4"></div><button onclick="addQ()" class="w-full bg-slate-100 p-3 rounded mb-4">إضافة سؤال</button><button onclick="svQ()" class="btn-primary">حفظ سحابياً</button></div><div class="card-box"><h3>النتائج</h3><div id="rb">جاري التحميل..</div></div></div>`;
            ldR();
        }

        window.renderStudentPortal = async () => {
            document.getElementById('lms-content').innerHTML = `<input type="text" id="sn" class="w-full p-4 border rounded mb-6" placeholder="اسمك الثلاثي.."><div id="sq" class="grid md:grid-cols-3 gap-6">جاري جلب الاختبارات..</div>`;
            const s = await getDocs(collection(db, DP, 'quizzes'));
            qCache = []; s.forEach(d => qCache.push({id:d.id, ...d.data()}));
            document.getElementById('sq').innerHTML = qCache.map(q => `<div onclick="stQ('${q.id}')" class="card-box cursor-pointer"><h4>${q.title}</h4></div>`).join('');
        };

        window.stQ = id => {
            const n = document.getElementById('sn').value; if(!n) return toast("أدخل اسمك", "error");
            const q = qCache.find(x => x.id === id); curQ = q;
            document.getElementById('lms-content').innerHTML = `<div class="card-box max-w-4xl mx-auto"><h2>${q.title}</h2><div id="tqs" class="space-y-6 my-6"></div><button onclick="subQ()" class="btn-primary">تسليم</button></div>`;
            document.getElementById('tqs').innerHTML = q.questions.map((qu, i) => `<div class="p-4 border rounded-xl trb" data-idx="${i}"><h4>${i+1}. ${qu.text}</h4><div class="grid grid-cols-2 gap-2 mt-2">${qu.options.map((o, j) => `<div onclick="selOp(this)" class="p-3 border rounded cursor-pointer qop" data-v="${j}">${o}</div>`).join('')}</div></div>`).join('');
        };

        window.selOp = el => { el.parentElement.querySelectorAll('.qop').forEach(x => x.classList.remove('bg-blue-100', 'border-blue-500', 'sel')); el.classList.add('bg-blue-100', 'border-blue-500', 'sel'); };

        window.subQ = async () => {
            let sc = 0; document.querySelectorAll('.trb').forEach(b => { const s = b.querySelector('.sel'); if(s && parseInt(s.dataset.v) === curQ.questions[b.dataset.idx].correctAnswer) sc++; });
            await addDoc(collection(db, DP, 'results'), { studentName: document.getElementById('sn').value, quizTitle: curQ.title, score: sc, total: curQ.questions.length, timestamp: new Date().toISOString() });
            document.getElementById('lms-content').innerHTML = `<div class="card-box max-w-md mx-auto text-center"><h2>الدرجة: ${sc}/${curQ.questions.length}</h2><button onclick="renderStudentPortal()" class="btn-primary mt-6">عودة</button></div>`;
        };

        async function ldR() {
            const s = await getDocs(collection(db, DP, 'results')); let h = '<table class="w-full text-right"><tr><th>الاسم</th><th>الدرجة</th></tr>';
            s.forEach(doc => { const d = doc.data(); h += `<tr><td>${d.studentName}</td><td>${d.score}/${d.total}</td></tr>`; });
            document.getElementById('rb').innerHTML = h + '</table>';
        }

        window.addQ = () => { 
            const d = document.createElement('div'); d.className = 'p-3 border rounded qb'; 
            d.innerHTML = `<input type="text" class="tx w-full mb-2 p-2 border" placeholder="السؤال"><div class="grid grid-cols-2 gap-2"><input class="o1 border p-1" placeholder="1"><input class="o2 border p-1" placeholder="2"><input class="o3 border p-1" placeholder="3"><input class="o4 border p-1" placeholder="4"></div><input type="number" class="cr w-full mt-2 p-2 border" placeholder="رقم الإجابة الصحيحة (1-4)">`;
            document.getElementById('qc').appendChild(d);
        };

        window.svQ = async () => {
            const t = document.getElementById('qt').value; if(!t) return;
            let qs = []; document.querySelectorAll('.qb').forEach(b => { qs.push({ text: b.querySelector('.tx').value, options: [b.querySelector('.o1').value, b.querySelector('.o2').value, b.querySelector('.o3').value, b.querySelector('.o4').value], correctAnswer: parseInt(b.querySelector('.cr').value)-1 }); });
            await addDoc(collection(db, DP, 'quizzes'), { title: t, questions: qs });
            toast("تم الحفظ"); renderAdminDash();
        };

        window.impJ = e => { const r = new FileReader(); r.onload = ev => { JSON.parse(ev.target.result).forEach(q => { window.addQ(); const last = document.querySelector('#qc').lastChild; last.querySelector('.tx').value = q.text; last.querySelector('.o1').value = q.options[0]; last.querySelector('.o2').value = q.options[1]; last.querySelector('.o3').value = q.options[2]; last.querySelector('.o4').value = q.options[3]; last.querySelector('.cr').value = q.correctAnswer+1; }); }; r.readAsText(e.target.files[0]); };
    </script>
</body>
</html>
