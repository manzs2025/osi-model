<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — أكاديمية الشبكات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary:        #6c2fa0;
    --primary-light:  #8b46c8;
    --primary-dark:   #4a1f6e;
    --accent:         #00c9b1;
    --accent-dark:    #00a896;
    --bg:             #080a14;
    --bg2:            #0f1120;
    --card:           #13162a;
    --border:         rgba(108,47,160,0.22);
    --border-focus:   rgba(0,201,177,0.55);
    --text:           #e8eaf6;
    --text-muted:     #7a7f9e;
    --error-bg:       rgba(244,67,54,0.1);
    --error-border:   rgba(244,67,54,0.4);
    --error-text:     #ff6b6b;
    --success-bg:     rgba(0,201,177,0.1);
    --success-border: rgba(0,201,177,0.4);
  }

  html, body {
    height: 100%;
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
  }

  /* ── BACKGROUND GRID EFFECT ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,47,160,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,47,160,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(108,47,160,0.18) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .page-wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  /* ── CARD ── */
  .login-card {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.75rem 2.5rem;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* top accent line */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 20px 20px 0 0;
  }

  /* subtle inner glow */
  .login-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(108,47,160,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)     scale(1);    }
  }

  /* ── LOGO ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.25rem;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .logo-icon {
    width: 62px; height: 62px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.7rem;
    margin-bottom: 1rem;
    box-shadow: 0 8px 30px rgba(108,47,160,0.35);
  }

  .logo-title {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    font-weight: 400;
  }

  /* ── FORM ── */
  .form-group {
    margin-bottom: 1.25rem;
    animation: fadeUp 0.5s ease both;
  }

  .form-group:nth-child(1) { animation-delay: 0.18s; }
  .form-group:nth-child(2) { animation-delay: 0.26s; }
  .form-group:nth-child(3) { animation-delay: 0.34s; }

  label {
    display: block;
    font-size: 0.83rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 0.55rem;
    letter-spacing: 0.02em;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    right: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
    transition: color 0.2s;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 0.82rem 2.6rem 0.82rem 1rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.93rem;
    direction: rtl;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--border-focus);
    background: rgba(0,201,177,0.04);
    box-shadow: 0 0 0 3px rgba(0,201,177,0.1);
  }

  input:focus + .input-icon,
  input:focus ~ .input-icon {
    color: var(--accent);
  }

  /* password toggle */
  .pass-toggle {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.2rem;
    line-height: 1;
    transition: color 0.2s;
  }
  .pass-toggle:hover { color: var(--accent); }

  /* ── SUBMIT BUTTON ── */
  .btn-login {
    width: 100%;
    padding: 0.88rem;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 0.97rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease 0.38s both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .btn-login:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(108,47,160,0.4);
  }

  .btn-login:active:not(:disabled) { transform: translateY(0); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* shimmer on hover */
  .btn-login::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }
  .btn-login:hover::before { left: 160%; }

  /* spinner */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner   { display: block; }

  /* ── MESSAGES ── */
  .msg-box {
    display: none;
    padding: 0.85rem 1.1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 1.25rem;
    animation: msgIn 0.3s ease both;
    align-items: flex-start;
    gap: 0.6rem;
  }

  .msg-box.show { display: flex; }

  .msg-box.error {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error-text);
  }

  .msg-box.success {
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    color: var(--accent);
  }

  .msg-icon { flex-shrink: 0; font-size: 1rem; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.5rem 0 1.25rem;
    color: var(--text-muted);
    font-size: 0.75rem;
    animation: fadeUp 0.5s ease 0.32s both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── BACK LINK ── */
  .back-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-top: 1.5rem;
    font-size: 0.82rem;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
    animation: fadeUp 0.5s ease 0.44s both;
  }
  .back-link:hover { color: var(--accent); }

  /* ── FOOTER NOTE ── */
  .card-footer {
    margin-top: 1.75rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-muted);
    animation: fadeUp 0.5s ease 0.5s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .login-card { padding: 2rem 1.5rem; border-radius: 16px; }
    .logo-icon  { width: 52px; height: 52px; font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">🌐</div>
      <div class="logo-title">أكاديمية الشبكات</div>
      <div class="logo-sub">المؤسسة العامة للتدريب التقني والمهني</div>
    </div>

    <!-- Error / Success Messages -->
    <div class="msg-box error" id="msgError">
      <span class="msg-icon">⚠️</span>
      <span id="msgErrorText"></span>
    </div>
    <div class="msg-box success" id="msgSuccess">
      <span class="msg-icon">✅</span>
      <span id="msgSuccessText"></span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="emailInput">الرقم التدريبي أو البريد الإلكتروني</label>
        <div class="input-wrap">
          <input
            type="text"
            id="emailInput"
            placeholder="أدخل رقمك التدريبي (10 أرقام)"
            autocomplete="username"
            inputmode="numeric"
            style="direction:ltr;text-align:right;"
            required
          >
          <span class="input-icon">🎓</span>
        </div>
      </div>

      <div class="form-group">
        <label for="passwordInput">كلمة المرور</label>
        <div class="input-wrap">
          <input
            type="password"
            id="passwordInput"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <span class="input-icon">🔒</span>
          <button type="button" class="pass-toggle" id="passToggle" aria-label="إظهار كلمة المرور">
            👁️
          </button>
        </div>
      </div>

      <div class="divider">أو</div>

      <div class="form-group">
        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">تسجيل الدخول</span>
          <div class="spinner"></div>
        </button>
      </div>

    </form>

    <a href="index.html" class="back-link">
      ← العودة إلى الموقع
    </a>

    <div class="card-footer">
      الدخول مخصص للمشرفين فقط
    </div>

  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
